<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="학습 플래너">
<meta name="theme-color" content="#1a7a4a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>학습 플래너</title>

<style>
  :root {
    --green-deep: #1a7a4a;
    --green-mid: #2ecc71;
    --green-light: #a8f0c6;
    --green-pale: #e8f8f0;
    --white: #ffffff;
    --gray-1: #f7f9f8;
    --gray-2: #e8ece9;
    --gray-3: #b0bab4;
    --gray-4: #6b7c74;
    --text-dark: #1a2620;
    --red: #e74c3c;
    --shadow-card: 0 2px 12px rgba(0,0,0,0.07);
    --radius: 20px;
    --radius-sm: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
    background: var(--gray-1);
    color: var(--text-dark);
    height: 100vh; max-height: 100vh;
    overflow: hidden;
    display: flex; align-items: stretch; justify-content: center;
    padding: 0;
  }

  /* SCREENS */
  .screen {
    display: none; width: 100%; max-width: 500px;
    height: 100vh; max-height: 100vh;
    background: var(--white); border-radius: 0;
    overflow: hidden; position: relative; flex-direction: column;
  }
  .screen.active { display: flex; }

  /* HEADER */
  .screen-header { padding: 48px 28px 16px; background: var(--white); position: relative; }
  .month-btn {
    font-family: 'Georgia', 'Times New Roman', serif; font-size: 28px;
    color: var(--text-dark); background: none; border: none;
    cursor: pointer; display: flex; align-items: center; gap: 8px; padding: 0;
    transition: color 0.2s;
  }
  .month-btn:hover { color: var(--green-deep); }
  .month-btn .arrow {
    width: 22px; height: 22px; background: var(--green-pale); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: var(--green-deep); transition: background 0.2s;
  }
  .month-btn:hover .arrow { background: var(--green-light); }
  .header-sub { font-size: 13px; color: var(--gray-3); margin-top: 4px; font-weight: 300; }

  /* DAILY */
  #daily-screen .screen-content {
    flex: 1; padding: 0 22px 30px;
    overflow-y: auto; scrollbar-width: none;
  }
  #daily-screen .screen-content::-webkit-scrollbar { display: none; }
  .date-big {
    font-family: 'Georgia', 'Times New Roman', serif; font-size: 72px;
    line-height: 1; color: var(--text-dark); letter-spacing: -2px; margin-bottom: 4px;
  }
  .date-day { font-size: 14px; color: var(--gray-3); font-weight: 300; margin-bottom: 20px; }

  .daily-tasks-box {
    background: var(--gray-1); border-radius: var(--radius);
    padding: 18px; 
    border: 1.5px dashed var(--gray-2); position: relative;
    max-height: 55vh; display: flex; flex-direction: column;
  }
  #daily-task-list {
    overflow-y: auto; scrollbar-width: none; flex: 1;
  }
  #daily-task-list::-webkit-scrollbar { display: none; }
  .daily-box-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;
  }
  .box-label {
    font-size: 11px; font-weight: 700; color: var(--gray-3);
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .add-task-btn {
    width: 28px; height: 28px; background: var(--green-deep); border: none;
    border-radius: 50%; color: white; font-size: 20px; line-height: 1;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0; font-weight: 300;
  }
  .add-task-btn:hover { background: #155e38; transform: scale(1.08); }

  .daily-task-item {
    background: var(--white); border-radius: var(--radius-sm);
    margin-bottom: 9px;
    box-shadow: var(--shadow-card); animation: slideIn 0.25s ease;
    overflow: hidden;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .daily-task-check {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid var(--green-mid); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s;
  }
  .daily-task-check.done { background: var(--green-mid); border-color: var(--green-mid); }
  .daily-task-check.done::after { content: '✓'; color: white; font-size: 12px; font-weight: 700; }
  .daily-task-text { font-size: 14px; flex: 1; }
  .daily-task-text.done { text-decoration: line-through; color: var(--gray-3); }
  .daily-task-remove {
    background: none; border: none; cursor: pointer;
    color: var(--gray-3); font-size: 15px; padding: 0 4px;
    transition: color 0.15s; flex-shrink: 0;
  }
  .daily-task-remove:hover { color: var(--red); }

  /* TIMER EXPAND */
  .task-expand {
    border-top: 1px solid var(--gray-2);
    padding: 12px 14px 14px;
    display: none;
  }
  .task-expand.open { display: block; }
  .timer-display {
    display: flex; align-items: center; gap: 14px; margin-bottom: 12px;
  }
  .timer-circle {
    position: relative; width: 64px; height: 64px; flex-shrink: 0;
  }
  .timer-svg { transform: rotate(-90deg); }
  .timer-bg { fill: none; stroke: var(--gray-2); stroke-width: 5; }
  .timer-ring {
    fill: none; stroke: var(--green-mid); stroke-width: 5;
    stroke-linecap: round; stroke-dasharray: 163; stroke-dashoffset: 163;
    transition: stroke-dashoffset 1s linear;
  }
  .timer-text-center {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: var(--text-dark);
  }
  .timer-info { flex: 1; }
  .timer-session { font-size: 11px; color: var(--gray-3); margin-bottom: 3px; }
  .timer-total { font-size: 13px; font-weight: 600; color: var(--gray-4); }
  .timer-total span { color: var(--green-deep); }
  .timer-btns { display: flex; gap: 8px; }
  .tbtn {
    flex: 1; border: none; border-radius: 10px;
    padding: 10px 0; font-size: 13px; font-weight: 600;
    font-family: 'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    cursor: pointer; transition: all 0.15s;
  }
  .tbtn.start { background: var(--green-deep); color: white; }
  .tbtn.start:hover { background: #155e38; }
  .tbtn.plus { background: var(--green-pale); color: var(--green-deep); }
  .tbtn.plus:hover { background: var(--green-light); }
  .tbtn.gray { background: var(--gray-2); color: var(--gray-4); }
  .tbtn.gray:hover { background: #d0d6d2; }
  .task-time-badge {
    font-size: 12px; color: var(--gray-3); font-weight: 500;
    flex-shrink: 0; margin-right: 2px;
  }

  .empty-hint {
    text-align: center; color: var(--gray-3); font-size: 13px;
    padding: 36px 0 20px; line-height: 2;
  }
  .empty-hint .icon { font-size: 30px; margin-bottom: 8px; display: block; }

  /* DRAWER */
  .subtask-drawer {
    display: none; position: absolute;
    left: 0; right: 0; bottom: 0;
    background: var(--white); border-radius: var(--radius);
    box-shadow: 0 -4px 28px rgba(26,122,74,0.14);
    z-index: 10; max-height: 360px;
    overflow-y: auto; scrollbar-width: none;
    animation: drawerUp 0.24s cubic-bezier(.4,0,.2,1);
  }
  .subtask-drawer::-webkit-scrollbar { display: none; }
  @keyframes drawerUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .subtask-drawer.open { display: block; }
  .drawer-header {
    position: sticky; top: 0; background: var(--white);
    padding: 16px 18px 10px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--gray-2);
  }
  .drawer-title { font-size: 13px; font-weight: 600; color: var(--gray-4); }
  .drawer-close {
    background: none; border: none; cursor: pointer;
    color: var(--gray-3); font-size: 18px; line-height: 1; padding: 0 2px;
    transition: color 0.2s;
  }
  .drawer-close:hover { color: var(--text-dark); }
  .drawer-goal-section { padding: 6px 16px; }

  .drawer-sub-item {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px; border-radius: var(--radius-sm);
    cursor: pointer; transition: all 0.15s; margin-bottom: 4px;
    border: 1.5px solid transparent; background: var(--gray-1);
  }
  .drawer-sub-item:hover { background: var(--green-pale); border-color: var(--green-light); }
  .drawer-sub-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green-light); flex-shrink: 0; }
  .drawer-sub-text { font-size: 14px; flex: 1; font-weight: 600; }
  .drawer-empty { padding: 20px 18px; color: var(--gray-3); font-size: 13px; text-align: center; }

  /* 직접 입력 영역 */
  .drawer-direct-section {
    padding: 10px 16px 14px;
    border-top: 1px solid var(--gray-2);
    margin-top: 4px;
  }
  .drawer-direct-label {
    font-size: 11px; font-weight: 700; color: var(--gray-3);
    letter-spacing: 0.06em; text-transform: uppercase;
    margin-bottom: 8px;
  }
  .drawer-direct-row { display: flex; gap: 8px; }
  .drawer-direct-input {
    flex: 1; background: var(--gray-1); border: 1.5px solid var(--gray-2);
    border-radius: var(--radius-sm); padding: 10px 13px;
    font-size: 14px; font-family: 'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    color: var(--text-dark); outline: none; transition: border-color 0.2s;
  }
  .drawer-direct-input:focus { border-color: var(--green-mid); background: var(--white); }
  .drawer-direct-btn {
    width: 42px; height: 42px; background: var(--green-deep); border: none;
    border-radius: var(--radius-sm); color: white; font-size: 20px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.2s;
  }
  .drawer-direct-btn:hover { background: #155e38; }

  /* MONTHLY */
  #monthly-screen .screen-content {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
  }
  .monthly-fixed {
    padding: 0 22px; flex-shrink: 0;
  }
  .monthly-scroll {
    flex: 1; overflow-y: auto; padding: 0 22px 30px; scrollbar-width: none;
  }
  .monthly-scroll::-webkit-scrollbar { display: none; }

  .donut-wrap { display: flex; flex-direction: column; align-items: center; padding: 12px 0 20px; }
  .donut-container { position: relative; width: 160px; height: 160px; }
  .donut-svg { transform: rotate(-90deg); }
  .donut-bg { fill: none; stroke: var(--gray-2); stroke-width: 18; }
  .donut-fill {
    fill: none; stroke: var(--green-mid); stroke-width: 18; stroke-linecap: round;
    transition: stroke-dashoffset 0.8s cubic-bezier(.4,0,.2,1);
  }
  .donut-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .donut-pct { font-family: 'Georgia', 'Times New Roman', serif; font-size: 36px; color: var(--text-dark); line-height: 1; }
  .donut-label { font-size: 11px; color: var(--gray-3); margin-top: 2px; }

  .goals-section-label {
    font-size: 12px; font-weight: 700; color: var(--gray-3);
    letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between;
  }
  .add-goal-btn {
    background: var(--green-deep); color: white; border: none;
    border-radius: 20px; padding: 5px 13px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif; transition: all 0.2s;
  }
  .add-goal-btn:hover { background: #155e38; }

  .goal-card {
    background: var(--gray-1); border-radius: var(--radius);
    padding: 18px 18px 16px; margin-bottom: 12px;
    border: 1.5px solid transparent; transition: all 0.22s;
  }
  .goal-card:hover { border-color: var(--green-light); box-shadow: 0 4px 18px rgba(46,204,113,0.10); }
  .goal-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .goal-card-title {
    font-size: 15px; font-weight: 600; color: var(--text-dark);
    flex: 1; cursor: pointer; transition: color 0.15s;
  }
  .goal-card-title:hover { color: var(--green-deep); }
  .goal-card-count {
    font-size: 12px; color: var(--gray-3);
    background: var(--white); padding: 3px 9px; border-radius: 12px;
  }
  .goal-action-btn {
    background: none; border: none; cursor: pointer;
    font-size: 15px; padding: 3px 5px; color: var(--gray-3);
    transition: color 0.15s; border-radius: 6px;
  }
  .goal-action-btn.edit:hover { color: var(--green-deep); }
  .goal-action-btn.del:hover { color: var(--red); }

  .goal-progress-bar {
    height: 8px; background: var(--gray-2); border-radius: 10px;
    overflow: hidden; margin-bottom: 6px; position: relative;
  }
  .gp-actual {
    position: absolute; top: 0; left: 0; height: 100%;
    background: linear-gradient(90deg, var(--green-mid), var(--green-deep));
    border-radius: 10px; transition: width 0.6s cubic-bezier(.4,0,.2,1);
  }
  .goal-progress-nums { display: flex; justify-content: space-between; font-size: 11px; color: var(--gray-3); }
  .goal-pct-actual { color: var(--green-deep); font-weight: 600; }

  .divider { height: 1px; background: var(--gray-2); margin: 14px 0; }

  /* DETAIL */
  #detail-screen .screen-header { padding-bottom: 12px; }
  #detail-screen .screen-content {
    flex: 1; padding: 0 22px 30px; overflow-y: auto; scrollbar-width: none;
  }
  #detail-screen .screen-content::-webkit-scrollbar { display: none; }
  .back-btn {
    display: flex; align-items: center; gap: 6px;
    background: none; border: none; cursor: pointer;
    font-size: 14px; color: var(--gray-4);
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
    margin-bottom: 14px; padding: 0; transition: color 0.2s;
  }
  .back-btn:hover { color: var(--green-deep); }
  .detail-goal-title { font-family: 'Georgia', 'Times New Roman', serif; font-size: 24px; margin-bottom: 4px; }
  .detail-progress-summary { font-size: 13px; color: var(--gray-3); margin-bottom: 20px; }
  .detail-progress-summary span { color: var(--green-deep); font-weight: 600; }

  /* MODALS */
  .modal-overlay {
    display: none; position: absolute; inset: 0;
    background: rgba(26,38,32,0.45); z-index: 100;
    align-items: flex-end; backdrop-filter: blur(2px);
  }
  .modal-overlay.show { display: flex; }
  .modal-sheet {
    background: var(--white); border-radius: 28px 28px 0 0;
    padding: 26px 24px 40px; width: 100%;
    animation: slideUp 0.26s cubic-bezier(.4,0,.2,1);
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
  .modal-input {
    width: 100%; background: var(--gray-1); border: 1.5px solid var(--gray-2);
    border-radius: var(--radius-sm); padding: 12px 16px; font-size: 14px;
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif; color: var(--text-dark);
    outline: none; margin-bottom: 10px; transition: border-color 0.2s;
  }
  .modal-input:focus { border-color: var(--green-mid); background: var(--white); }
  .modal-submit {
    width: 100%; background: var(--green-deep); color: white; border: none;
    border-radius: var(--radius-sm); padding: 14px; font-size: 15px; font-weight: 600;
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif; cursor: pointer; transition: all 0.2s;
  }
  .modal-submit:hover { background: #155e38; }
  .modal-cancel {
    width: 100%; background: none; border: none; color: var(--gray-3); font-size: 14px;
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif; cursor: pointer; padding: 10px; margin-top: 4px;
  }
  .confirm-btns { display: flex; gap: 10px; margin-top: 6px; }
  .confirm-del {
    flex: 1; background: var(--red); color: white; border: none;
    border-radius: var(--radius-sm); padding: 13px; font-size: 15px; font-weight: 600;
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif; cursor: pointer;
  }
  .confirm-cancel {
    flex: 1; background: var(--gray-2); color: var(--gray-4); border: none;
    border-radius: var(--radius-sm); padding: 13px; font-size: 15px; font-weight: 600;
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif; cursor: pointer;
  }
  .delete-desc { font-size: 13px; color: var(--gray-4); margin-bottom: 18px; }

  /* RANGE INPUT */
  .range-input {
    flex: 1; min-width: 0;
    background: var(--white); border: 1.5px solid var(--gray-2);
    border-radius: var(--radius-sm); padding: 10px 12px;
    font-size: 15px; font-weight: 600;
    font-family: 'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    color: var(--text-dark); outline: none; text-align: center;
    transition: border-color 0.2s;
  }
  .range-input:focus { border-color: var(--green-mid); }
  .range-input.unit-input { font-size: 13px; text-align: left; }

  /* HISTORY ITEM */
  .history-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; background: var(--gray-1);
    border-radius: var(--radius-sm); margin-bottom: 8px;
    font-size: 14px;
  }
  .history-date { font-size: 12px; color: var(--gray-3); font-weight: 500;}
  .history-range { font-weight: 600; }

  /* NEW DAILY TASK */
  .daily-task-main {
    display: flex; align-items: center; gap: 11px; padding: 12px 14px; cursor: pointer;
  }
  .daily-task-name { font-size: 14px; color: var(--text-dark); font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .daily-range-wrap { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  
  .daily-range-fixed, .daily-range-input {
    background: var(--white); border: 1.5px solid var(--gray-2);
    border-radius: 8px; padding: 7px 10px;
    font-size: 14px; font-weight: 600; color: var(--text-dark);
    min-width: 44px; text-align: center;
    font-family: 'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  }
  .daily-range-fixed {
    color: var(--text-dark);
    user-select: none;
  }
  .daily-range-input {
    width: 60px; outline: none; transition: border-color 0.2s;
  }
  .daily-range-input:focus { border-color: var(--green-mid); }
  .daily-unit { font-size: 13px; color: var(--gray-4); flex-shrink: 0; font-weight: 500;}
  
  .daily-task-item.done-item .daily-task-name,
  .daily-task-item.done-item .daily-range-fixed,
  .daily-task-item.done-item .daily-range-input { color: var(--gray-3); text-decoration: line-through; }

</style>
</head>
<body>

<div id="daily-screen" class="screen active">
  <div class="screen-header">
    <button class="month-btn" onclick="showMonthly()">
      <span id="daily-month-label">3월</span>
      <span class="arrow">↑</span>
    </button>
  </div>
  <div class="screen-content">
    <div class="date-big" id="today-date">27</div>
    <div class="date-day" id="today-day">금요일 · 3월 2026</div>

    <div class="daily-tasks-box" id="daily-tasks-box">
      <div class="daily-box-header">
        <span class="box-label">오늘의 학습</span>
        <button class="add-task-btn" id="add-task-btn" onclick="toggleDrawer(event)" title="목표 추가">+</button>
      </div>
      <div id="daily-task-list"></div>
      <div id="daily-empty" class="empty-hint">
        <span class="icon">📚</span>
        오른쪽 <strong style="color:var(--green-deep)">+</strong> 버튼으로<br>오늘의 목표 분량을 추가해보세요
      </div>

      <div class="subtask-drawer" id="subtask-drawer">
        <div class="drawer-header">
          <span class="drawer-title">목표 불러오기</span>
          <button class="drawer-close" onclick="closeDrawer()">✕</button>
        </div>
        <div class="drawer-goal-section" id="drawer-content"></div>
        <div class="drawer-direct-section">
          <div class="drawer-direct-label">직접 입력 (진행률 반영X)</div>
          <div class="drawer-direct-row">
            <input class="drawer-direct-input" id="drawer-direct-input" type="text" placeholder="직접 할 일 입력하기">
            <button class="drawer-direct-btn" onclick="addDirectTask()">+</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="monthly-screen" class="screen">
  <div class="screen-header">
    <button class="month-btn" onclick="showDaily()">
      <span id="monthly-month-label">3월</span>
      <span class="arrow">↓</span>
    </button>
  </div>
  <div class="screen-content">
    <div class="monthly-fixed">
      <div class="donut-wrap">
        <div class="donut-container">
          <svg class="donut-svg" width="160" height="160" viewBox="0 0 160 160">
            <circle class="donut-bg" cx="80" cy="80" r="62"/>
            <circle class="donut-fill" cx="80" cy="80" r="62" id="donut-actual" stroke-dasharray="389.56" stroke-dashoffset="389.56"/>
          </svg>
          <div class="donut-center">

      <input class="modal-input" id="goal-modal-from" type="number" placeholder="시작 번호 (예: 1)" style="margin:0;flex:1;min-width:0;">

      <button class="confirm-del" onclick="confirmDelete()">삭제</button>

<script>
// ===== DATE LOGIC =====
const today = new Date();
const currentMonth = today.getMonth();
const currentYear = today.getFullYear();
const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
const daysPassed = today.getDate();
const MONTHS_KR = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const DAYS_KR = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];

const monthKey = currentYear + '-' + (currentMonth + 1);
const todayKey = (currentMonth + 1) + '/' + today.getDate();

// ===== STORAGE =====
const STORAGE_KEY_GOALS = 'sp_goals_v2_' + monthKey; 
const STORAGE_KEY_NEXT_GOAL_ID = 'sp_nextGoalId_v2_' + monthKey;
const STORAGE_KEY_DAILY = 'sp_daily_v2';
const STORAGE_KEY_DAILY_DATE = 'sp_dailyDate_v2';
const STORAGE_KEY_DAILY_NEXT_ID = 'sp_dailyNextId_v2';

let goals = [];
let nextGoalId = 1;
let dailyTasks = [];
let dailyTaskNextId = 1;
let drawerOpen = false;
let currentDetailGoalId = null;
let goalModalMode = 'add';
let goalModalEditId = null;
let deleteTargetId = null;

function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY_GOALS, JSON.stringify(goals));
    localStorage.setItem(STORAGE_KEY_NEXT_GOAL_ID, nextGoalId);
    localStorage.setItem(STORAGE_KEY_DAILY, JSON.stringify(dailyTasks));
    localStorage.setItem(STORAGE_KEY_DAILY_DATE, todayKey);
    localStorage.setItem(STORAGE_KEY_DAILY_NEXT_ID, dailyTaskNextId);
    localStorage.setItem('sp_taskTimers_v2', JSON.stringify(taskTimers));
  } catch(e) { console.warn('저장 실패', e); }
}

function loadData() {
  try {
    const savedGoals = localStorage.getItem(STORAGE_KEY_GOALS);
    if (savedGoals !== null) {
      goals = JSON.parse(savedGoals);
      let maxId = 0;
      goals.forEach(g => { if (g.id > maxId) maxId = g.id; });
      const loadedNextId = parseInt(localStorage.getItem(STORAGE_KEY_NEXT_GOAL_ID));
      nextGoalId = (!isNaN(loadedNextId) && loadedNextId > maxId) ? loadedNextId : maxId + 1;
    }
    
    const savedDate = localStorage.getItem(STORAGE_KEY_DAILY_DATE);
    if (savedDate === todayKey) {
      const savedDaily = localStorage.getItem(STORAGE_KEY_DAILY);
      if (savedDaily) dailyTasks = JSON.parse(savedDaily);
      let maxTaskId = 0;
      dailyTasks.forEach(t => { if (t.id > maxTaskId) maxTaskId = t.id; });
      let loadedDailyNextId = parseInt(localStorage.getItem(STORAGE_KEY_DAILY_NEXT_ID));
      dailyTaskNextId = (!isNaN(loadedDailyNextId) && loadedDailyNextId > maxTaskId) ? loadedDailyNextId : maxTaskId + 1;
      
      const savedTimers = localStorage.getItem('sp_taskTimers_v2');
      if (savedTimers) taskTimers = JSON.parse(savedTimers);
    } else {
      localStorage.removeItem('sp_taskTimers_v2');
    }
  } catch(e) { console.warn('데이터 로드 중 오류 발생:', e); }
}

function init() {
  loadData();
  requestNotificationPermission();
  document.getElementById('today-date').textContent = today.getDate();
  document.getElementById('today-day').textContent =
    DAYS_KR[today.getDay()] + ' · ' + MONTHS_KR[currentMonth] + ' ' + currentYear;
  const mo = MONTHS_KR[currentMonth];
  document.getElementById('daily-month-label').textContent = mo;
  document.getElementById('monthly-month-label').textContent = mo;
  
  renderDailyTasks();
  renderGoalCards();
  updateDonut();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  closeDrawer();
}
function showMonthly() { renderGoalCards(); updateDonut(); showScreen('monthly-screen'); }
function showDaily() { renderDailyTasks(); showScreen('daily-screen'); }
function showDetail(goalId) {
  currentDetailGoalId = goalId;
  renderDetailScreen();
  showScreen('detail-screen');
}

// ===== DRAWER =====
function toggleDrawer(e) {
  e.stopPropagation();
  if (drawerOpen) { closeDrawer(); return; }
  drawerOpen = true;
  renderDrawer();
  document.getElementById('subtask-drawer').classList.add('open');
  setTimeout(() => document.addEventListener('click', outsideDrawerClick), 0);
}
function closeDrawer() {
  drawerOpen = false;
  document.getElementById('subtask-drawer').classList.remove('open');
  document.removeEventListener('click', outsideDrawerClick);
}
function outsideDrawerClick(e) {
  const drawer = document.getElementById('subtask-drawer');
  const btn = document.getElementById('add-task-btn');
  if (!drawer.contains(e.target) && e.target !== btn) closeDrawer();
}

function renderDrawer() {
  const content = document.getElementById('drawer-content');
  content.innerHTML = '';
  let anyItem = false;
  
  goals.forEach(goal => {
    if (!goal.rangeTo) return; // 분량 설정된 목표만 표시
    anyItem = true;
    
    const item = document.createElement('div');
    item.className = 'drawer-sub-item';
    item.innerHTML = `
      <div class="drawer-sub-dot"></div>
      <span class="drawer-sub-text">${goal.name}</span>
    `;
    
    item.onclick = (e) => { e.stopPropagation(); addDailyRangeTask(goal); };
    content.appendChild(item);
  });
  
  if (!anyItem) {
    content.innerHTML = '<div class="drawer-empty">월 목표에 목표 분량을 먼저 설정해주세요</div>';
  }
}

function addDailyRangeTask(goal) {
  dailyTasks.push({
    id: dailyTaskNextId++,
    text: goal.name,
    goalId: goal.id,
    done: false,
    targetValue: null
  });
  renderDailyTasks(); saveData();
}

function addDirectTask() {
  const input = document.getElementById('drawer-direct-input');
  const text = input.value.trim();
  if (!text) return;
  dailyTasks.push({
    id: dailyTaskNextId++,
    text: text,
    goalId: null,
    done: false
  });
  input.value = '';
  renderDailyTasks(); saveData();
}

// ===== DAILY TASKS =====
function renderDailyTasks() {
  const list = document.getElementById('daily-task-list');
  const empty = document.getElementById('daily-empty');
  list.innerHTML = '';
  empty.style.display = dailyTasks.length === 0 ? 'block' : 'none';
  
  dailyTasks.forEach(task => {
    const div = document.createElement('div');
    div.className = 'daily-task-item' + (task.done ? ' done-item' : '');
    const t = taskTimers[task.id] || { totalSec: 0, sessions: 0 };
    const timeLabel = formatTimerLabel(t.totalSec);
    const isExpanded = expandedTaskId === task.id;
    const isRunning = activeTimerId === task.id;
    const isPaused = pausedTimerId === task.id;
    
    // Timer text
    const remaining = timerRemaining[task.id] !== undefined ? timerRemaining[task.id] : 300;
    const offset = 163 - (163 * (300 - remaining) / 300);
    const timerDisplayText = isRunning || isPaused ? formatSeconds(remaining) : (t.sessions > 0 ? '✓' : '5:00');
    const sessionLabel = isRunning ? `${t.sessions + 1}회차 진행 중` : isPaused ? `${t.sessions + 1}회차 일시정지` : t.sessions > 0 ? `${t.sessions}회 완료` : '0회 · 누적 0분';

    const goal = task.goalId ? goals.find(g => g.id === task.goalId) : null;
    let mainContentHTML = '';
    
    if (goal) {
      // 완료된 항목이거나 이미 시작값이 저장된 경우 저장된 값을 사용, 그 외에는 현재 목표값을 표시
      const displayStart = (task.done && task.startValue !== undefined) ? task.startValue : goal.current;
      mainContentHTML = `
        <span class="daily-task-name">${task.text}</span>
        <div class="daily-range-wrap" onclick="event.stopPropagation()">
          <div class="daily-range-fixed">${displayStart}</div>
          <span style="color:var(--gray-3);font-size:14px;font-weight:600;">~</span>
          <input type="number" class="daily-range-input" id="range-input-${task.id}" value="${task.targetValue !== null ? task.targetValue : ''}" ${task.done ? 'disabled' : ''} placeholder="">
          <span class="daily-unit">${goal.unit}</span>
        </div>
      `;
    } else {
      // 직접 입력한 항목
      mainContentHTML = `<span class="daily-task-name" style="font-weight:400; font-size:14px; text-decoration: ${task.done ? 'line-through' : 'none'}; color: ${task.done ? 'var(--gray-3)' : 'inherit'}">${task.text}</span>`;
    }

    div.innerHTML = `
      <div class="daily-task-main" onclick="toggleTaskExpand(${task.id})">
        <div class="daily-task-check ${task.done ? 'done' : ''}" onclick="event.stopPropagation();toggleDailyTask(${task.id})"></div>
        ${mainContentHTML}
        ${timeLabel ? `<span class="task-time-badge">${timeLabel}</span>` : ''}
        <button class="daily-task-remove" onclick="event.stopPropagation();removeDailyTask(${task.id})">✕</button>
      </div>
      <div class="task-expand ${isExpanded ? 'open' : ''}">
        <div class="timer-display">
          <div class="timer-circle">
            <svg class="timer-svg" width="64" height="64" viewBox="0 0 64 64">
              <circle class="timer-bg" cx="32" cy="32" r="26"/>
              <circle class="timer-ring" cx="32" cy="32" r="26" id="ring-${task.id}"
                stroke-dashoffset="${isRunning ? offset : (t.sessions > 0 && !isRunning && !isPaused ? 0 : 163)}"/>
            </svg>
            <div class="timer-text-center" id="ttext-${task.id}">${timerDisplayText}</div>
          </div>
          <div class="timer-info">
            <div class="timer-session" id="tsession-${task.id}">${sessionLabel}</div>
            <div class="timer-total">누적 <span id="ttotal-${task.id}">${formatTimerLabel(t.totalSec) || '0분'}</span></div>
          </div>
        </div>
        <div class="timer-btns" id="tbtns-${task.id}">
          ${isRunning
            ? `<button class="tbtn gray" onclick="pauseTimer(${task.id})">일시정지</button>
               <button class="tbtn gray" onclick="stopTimer(${task.id})">그만하기</button>`
            : isPaused
            ? `<button class="tbtn start" onclick="resumeTimer(${task.id})">▶ 계속하기</button>
               <button class="tbtn gray" onclick="stopTimer(${task.id})">그만하기</button>`
            : t.sessions > 0
            ? `<button class="tbtn plus" onclick="startTimer(${task.id})">+5분 더</button>`
            : `<button class="tbtn start" onclick="startTimer(${task.id})">▶ 5분 시작</button>`
          }
        </div>
      </div>
    `;
    list.appendChild(div);
  });
}

function removeDailyTask(taskId) {
  dailyTasks = dailyTasks.filter(t => t.id !== taskId);
  renderDailyTasks(); saveData();
}

function toggleDailyTask(taskId) {
  const task = dailyTasks.find(t => t.id === taskId);
  if (!task) return;
  const goal = task.goalId ? goals.find(g => g.id === task.goalId) : null;

  if (!task.done) {
    if (goal) {
      const inputEl = document.getElementById('range-input-' + taskId);
      const targetVal = parseFloat(inputEl.value);
      
      if (isNaN(targetVal)) {
        alert('오늘 학습을 완료할 목표 분량(숫자)을 빈칸에 입력해주세요.');
        return;
      }
      if (targetVal <= goal.current) {
         alert('이전 완료 분량보다 큰 숫자를 입력해주세요.');
         return;
      }
      
      task.startValue = goal.current; // 완료 시점의 시작 분량을 고정 저장
      task.targetValue = targetVal;
      goal.history.push({
        date: todayKey,
        from: goal.current,
        to: targetVal,
        taskId: task.id // 나중에 체크 해제 시 삭제하기 위함
      });
      goal.current = targetVal;
    }
    task.done = true;
  } else {
    // 언체크(완료 취소) 처리
    if (goal) {
      // 마지막 히스토리가 현재 이 태스크로 인해 생성된 것이라면 롤백
      const lastHist = goal.history[goal.history.length - 1];
      if (lastHist && lastHist.taskId === task.id) {
        goal.current = lastHist.from;
        goal.history.pop();
      }
      task.targetValue = null;
      delete task.startValue; // 고정된 시작값 초기화
    }
    task.done = false;
  }
  renderDailyTasks(); renderGoalCards(); updateDonut(); saveData();
}

// ===== TIMER LOGIC ===== 
let taskTimers = {};
let timerRemaining = {};
let activeTimerId = null;
let pausedTimerId = null;
let timerInterval = null;
let expandedTaskId = null;
let audioCtx = null;
let pendingBeep = false; 

function getAudioCtx() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
function _doBeep(ctx) { try { [0, 0.3, 0.6].forEach(delay => { const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.connect(gain); gain.connect(ctx.destination); osc.frequency.value = 880; gain.gain.setValueAtTime(0.35, ctx.currentTime + delay); gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.3); osc.start(ctx.currentTime + delay); osc.stop(ctx.currentTime + delay + 0.3); }); } catch(e) {} }
function playBeep() { try { const ctx = getAudioCtx(); if (ctx.state === 'running') { _doBeep(ctx); } else { pendingBeep = true; ctx.resume().then(() => { _doBeep(ctx); pendingBeep = false; }).catch(() => {}); } } catch(e) { pendingBeep = true; } }
function handleUserGesture() { try { const ctx = getAudioCtx(); if (ctx.state === 'suspended') ctx.resume(); if (pendingBeep) { pendingBeep = false; _doBeep(ctx); } } catch(e) {} }
document.addEventListener('touchstart', handleUserGesture, { passive: true });
document.addEventListener('touchend', handleUserGesture, { passive: true });
document.addEventListener('click', handleUserGesture, { passive: true });

function formatSeconds(s) { const m = Math.floor(s / 60), sec = s % 60; return m + ':' + String(sec).padStart(2, '0'); }
function formatTimerLabel(totalSec) { if (!totalSec || totalSec === 0) return ''; const m = Math.floor(totalSec / 60); if (m < 60) return m + 'm'; const h = Math.floor(m / 60), rm = m % 60; return rm > 0 ? h + 'h ' + rm + 'm' : h + 'h'; }
function toggleTaskExpand(taskId) { expandedTaskId = expandedTaskId === taskId ? null : taskId; renderDailyTasks(); }

function startTimer(taskId) {
  if (activeTimerId && activeTimerId !== taskId) stopTimer(activeTimerId);
  activeTimerId = taskId; pausedTimerId = null;
  if (!timerRemaining[taskId]) timerRemaining[taskId] = 300;
  expandedTaskId = taskId;
  if (!taskTimers[taskId]) taskTimers[taskId] = { totalSec: 0, sessions: 0 };
  runTick(taskId); renderDailyTasks();
}
function runTick(taskId) { clearInterval(timerInterval); timerInterval = setInterval(() => { if (timerRemaining[taskId] > 0) { timerRemaining[taskId]--; updateTimerUI(taskId); } else { clearInterval(timerInterval); onTimerDone(taskId); } }, 1000); }
function updateTimerUI(taskId) {
  const remaining = timerRemaining[taskId]; const offset = 163 - (163 * (300 - remaining) / 300);
  const ring = document.getElementById('ring-' + taskId); const txt = document.getElementById('ttext-' + taskId);
  if (ring) ring.style.strokeDashoffset = offset; if (txt) txt.textContent = formatSeconds(remaining);
}
function pauseTimer(taskId) { clearInterval(timerInterval); pausedTimerId = taskId; activeTimerId = null; renderDailyTasks(); }
function resumeTimer(taskId) { activeTimerId = taskId; pausedTimerId = null; runTick(taskId); renderDailyTasks(); }
function stopTimer(taskId) { clearInterval(timerInterval); const elapsed = 300 - (timerRemaining[taskId] || 0); if (!taskTimers[taskId]) taskTimers[taskId] = { totalSec: 0, sessions: 0 }; taskTimers[taskId].totalSec += elapsed; timerRemaining[taskId] = 300; activeTimerId = null; pausedTimerId = null; renderDailyTasks(); saveData(); }
function onTimerDone(taskId) { clearInterval(timerInterval); if (!taskTimers[taskId]) taskTimers[taskId] = { totalSec: 0, sessions: 0 }; taskTimers[taskId].totalSec += 300; taskTimers[taskId].sessions++; timerRemaining[taskId] = 300; activeTimerId = null; pausedTimerId = null; playBeep(); if (Notification && Notification.permission === 'granted') { new Notification('5분 완료! ⏰', { body: '학습 완료', icon: './icon-192.png' }); } renderDailyTasks(); saveData(); }
function requestNotificationPermission() { if (Notification && Notification.permission === 'default') { Notification.requestPermission(); } }

// ===== MONTHLY OVERVIEW =====
function updateDonut() {
  let sumCurrent = 0, sumTarget = 0;
  goals.forEach(g => {
    if (g.rangeTo > 0) {
      sumCurrent += g.current;
      sumTarget += g.rangeTo;
    }
  });
  const actualPct = sumTarget > 0 ? Math.round((sumCurrent / sumTarget) * 100) : 0;
  const C = 2 * Math.PI * 62;
  document.getElementById('donut-actual').style.strokeDashoffset = C * (1 - actualPct / 100);
  document.getElementById('donut-pct').textContent = Math.min(100, actualPct) + '%';
}

function renderGoalCards() {
  const container = document.getElementById('goal-cards-container');
  container.innerHTML = '';
  if (goals.length === 0) {
    container.innerHTML = '<div style="text-align:center;color:var(--gray-3);font-size:13px;padding:30px 0;">아직 목표가 없어요<br>위 버튼으로 추가해보세요</div>';
    return;
  }
  goals.forEach(goal => {
    const total = goal.rangeTo || 0;
    const done = goal.current || 0;
    const actualPct = total > 0 ? Math.round((done / total) * 100) : 0;
    
    const card = document.createElement('div');
    card.className = 'goal-card';
    card.innerHTML = `
      <div class="goal-card-header">
        <div class="goal-card-title" onclick="showDetail(${goal.id})">${goal.name}</div>
        <div class="goal-card-count">${done}/${total}${goal.unit}</div>
        <button class="goal-action-btn edit" onclick="openEditGoalModal(${goal.id})">✏️</button>
        <button class="goal-action-btn del" onclick="openDeleteModal(${goal.id})">🗑️</button>
      </div>
      <div class="goal-progress-bar"><div class="gp-actual" style="width:${Math.min(100, actualPct)}%"></div></div>
      <div class="goal-progress-nums">
        <span class="goal-pct-actual">진행률 ${actualPct}%</span>
        <span style="color:var(--gray-3);font-size:11px;">${done}/${total}${goal.unit}</span>
      </div>
    `;
    container.appendChild(card);
  });
}

// ===== GOAL MODAL =====
function openAddGoalModal() {
  goalModalMode = 'add'; goalModalEditId = null;
  document.getElementById('goal-modal-title').textContent = '새 목표 추가';
  document.getElementById('goal-modal-name').value = '';
  document.getElementById('goal-modal-from').value = '1';
  document.getElementById('goal-modal-to').value = '';
  document.getElementById('goal-modal-unit').value = '';
  document.getElementById('goal-modal').classList.add('show');
  setTimeout(() => document.getElementById('goal-modal-name').focus(), 100);
}
function openEditGoalModal(id) {
  goalModalMode = 'edit'; goalModalEditId = id;
  const goal = goals.find(g => g.id === id);
  document.getElementById('goal-modal-title').textContent = '목표 수정';
  document.getElementById('goal-modal-name').value = goal.name;
  document.getElementById('goal-modal-from').value = goal.rangeFrom ?? '';
  document.getElementById('goal-modal-to').value = goal.rangeTo ?? '';
  document.getElementById('goal-modal-unit').value = goal.unit ?? '';
  document.getElementById('goal-modal').classList.add('show');
}
function closeGoalModal(e) {
  if (e && e.target !== document.getElementById('goal-modal') && !e.target.classList.contains('modal-cancel')) return;
  document.getElementById('goal-modal').classList.remove('show');
}
function submitGoalModal() {
  const name = document.getElementById('goal-modal-name').value.trim();
  if (!name) { document.getElementById('goal-modal-name').focus(); return; }
  const rangeFrom = parseFloat(document.getElementById('goal-modal-from').value) || 0;
  const rangeTo = parseFloat(document.getElementById('goal-modal-to').value) || 0;
  const unit = document.getElementById('goal-modal-unit').value.trim();
  
  if (goalModalMode === 'add') {
    // 첫 시작 current 할당 (예: 1부터 시작이면 0부터, 50부터 시작이면 49를 기본 베이스로)
    const startCurrent = rangeFrom > 0 ? (rangeFrom === 1 ? 0 : rangeFrom - 1) : 0;
    goals.push({ id: nextGoalId++, name, rangeFrom, rangeTo, unit, current: startCurrent, history: [] });
  } else {
    const goal = goals.find(g => g.id === goalModalEditId);
    if (goal) {
      goal.name = name; goal.rangeFrom = rangeFrom; goal.rangeTo = rangeTo; goal.unit = unit;
      if (currentDetailGoalId === goalModalEditId) renderDetailScreen();
    }
  }
  document.getElementById('goal-modal').classList.remove('show');
  renderGoalCards(); updateDonut(); saveData();
}

// ===== DELETE MODAL =====
function openDeleteModal(id) {
  deleteTargetId = id;
  const goal = goals.find(g => g.id === id);
  document.getElementById('delete-modal-title').textContent = `"${goal.name}" 삭제`;
  document.getElementById('delete-modal-desc').textContent = '관련된 기록도 모두 사라집니다.';
  document.getElementById('delete-modal').classList.add('show');
}
function closeDeleteModal(e) {
  if (e && e.target !== document.getElementById('delete-modal') && !e.target.classList.contains('confirm-cancel')) return;
  document.getElementById('delete-modal').classList.remove('show');
}
function confirmDelete() {
  const targetId = Number(deleteTargetId);
  goals = goals.filter(g => g.id !== targetId);
  dailyTasks = dailyTasks.filter(t => t.goalId !== targetId);
  document.getElementById('delete-modal').classList.remove('show');
  renderGoalCards(); updateDonut(); renderDailyTasks(); saveData();
}

// ===== DETAIL SCREEN (History) =====
function renderDetailScreen() {
  const goal = goals.find(g => g.id === currentDetailGoalId);
  document.getElementById('detail-title').textContent = goal.name;
  
  document.getElementById('detail-from-input').value = goal.rangeFrom || '';
  document.getElementById('detail-to-input').value = goal.rangeTo || '';
  document.getElementById('detail-unit-input').value = goal.unit || '';

  const pct = (goal.rangeTo > 0) ? Math.round((goal.current / goal.rangeTo) * 100) : 0;
  document.getElementById('detail-summary').innerHTML =
    `진행률 <span>${pct}%</span> &nbsp;·&nbsp; 현재 <span>${goal.current}</span> / ${goal.rangeTo} ${goal.unit}`;

  const list = document.getElementById('detail-history-list');
  list.innerHTML = '';
  if (!goal.history || goal.history.length === 0) {
    list.innerHTML = '<div style="color:var(--gray-3);font-size:13px;padding:20px 10px;text-align:center;">아직 학습 기록이 없어요</div>';
  } else {
    // 최신 기록이 위로 오게
    [...goal.history].reverse().forEach(h => {
      const div = document.createElement('div');
      div.className = 'history-item';
      div.innerHTML = `<span class="history-date">${h.date}</span><span class="history-range">${h.from}${goal.unit} ~ ${h.to}${goal.unit}</span>`;
      list.appendChild(div);
    });
  }
}
function saveDetailRange() {
  const goal = goals.find(g => g.id === currentDetailGoalId);
  goal.rangeFrom = parseFloat(document.getElementById('detail-from-input').value) || 0;
  goal.rangeTo = parseFloat(document.getElementById('detail-to-input').value) || 0;
  goal.unit = document.getElementById('detail-unit-input').value.trim();
  renderDetailScreen(); updateDonut(); renderGoalCards(); saveData();
  alert('저장되었습니다.');
}

document.getElementById('drawer-direct-input').addEventListener('keydown', e => { if (e.key === 'Enter') addDirectTask(); });
document.getElementById('goal-modal-name').addEventListener('keydown', e => { if (e.key === 'Enter') submitGoalModal(); });

init();

</script>
</body>
</html>
