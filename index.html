<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="학습 플래너">
<meta name="theme-color" content="#1a7a4a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>학습 플래너</title>

<style>
  :root {
    --green-deep: #1a7a4a;
    --green-mid: #2ecc71;
    --green-light: #a8f0c6;
    --green-pale: #e8f8f0;
    --white: #ffffff;
    --gray-1: #f7f9f8;
    --gray-2: #e8ece9;
    --gray-3: #b0bab4;
    --gray-4: #6b7c74;
    --text-dark: #1a2620;
    --red: #e74c3c;
    --shadow-card: 0 2px 12px rgba(0,0,0,0.07);
    --radius: 20px;
    --radius-sm: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
    background: var(--gray-1);
    color: var(--text-dark);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: env(safe-area-inset-top, 20px) env(safe-area-inset-right, 20px) env(safe-area-inset-bottom, 20px) env(safe-area-inset-left, 20px);
  }

  /* SCREENS */
  .screen {
    display: none; width: 390px; min-height: 780px;
    background: var(--white); border-radius: 36px;
    box-shadow: 0 20px 60px rgba(26,122,74,0.15), 0 4px 20px rgba(0,0,0,0.08);
    overflow: hidden; position: relative; flex-direction: column;
  }
  .screen.active { display: flex; }

  /* HEADER */
  .screen-header { padding: 48px 28px 16px; background: var(--white); position: relative; }
  .month-btn {
    font-family: 'Georgia', 'Times New Roman', serif; font-size: 28px;
    color: var(--text-dark); background: none; border: none;
    cursor: pointer; display: flex; align-items: center; gap: 8px; padding: 0;
    transition: color 0.2s;
  }
  .month-btn:hover { color: var(--green-deep); }
  .month-btn .arrow {
    width: 22px; height: 22px; background: var(--green-pale); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: var(--green-deep); transition: background 0.2s;
  }
  .month-btn:hover .arrow { background: var(--green-light); }
  .header-sub { font-size: 13px; color: var(--gray-3); margin-top: 4px; font-weight: 300; }

  /* DAILY */
  #daily-screen .screen-content {
    flex: 1; padding: 0 22px 30px;
    overflow-y: auto; scrollbar-width: none;
  }
  #daily-screen .screen-content::-webkit-scrollbar { display: none; }
  .date-big {
    font-family: 'Georgia', 'Times New Roman', serif; font-size: 72px;
    line-height: 1; color: var(--text-dark); letter-spacing: -2px; margin-bottom: 4px;
  }
  .date-day { font-size: 14px; color: var(--gray-3); font-weight: 300; margin-bottom: 20px; }

  .daily-tasks-box {
    background: var(--gray-1); border-radius: var(--radius);
    padding: 18px; min-height: 240px;
    border: 1.5px dashed var(--gray-2); position: relative;
  }
  .daily-box-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;
  }
  .box-label {
    font-size: 11px; font-weight: 700; color: var(--gray-3);
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .add-task-btn {
    width: 28px; height: 28px; background: var(--green-deep); border: none;
    border-radius: 50%; color: white; font-size: 20px; line-height: 1;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0; font-weight: 300;
  }
  .add-task-btn:hover { background: #155e38; transform: scale(1.08); }

  .daily-task-item {
    background: var(--white); border-radius: var(--radius-sm);
    padding: 12px 14px; margin-bottom: 9px;
    display: flex; align-items: center; gap: 11px;
    box-shadow: var(--shadow-card); animation: slideIn 0.25s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .daily-task-check {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid var(--green-mid); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s;
  }
  .daily-task-check.done { background: var(--green-mid); border-color: var(--green-mid); }
  .daily-task-check.done::after { content: '✓'; color: white; font-size: 12px; font-weight: 700; }
  .daily-task-text { font-size: 14px; flex: 1; }
  .daily-task-text.done { text-decoration: line-through; color: var(--gray-3); }
  .daily-task-tag {
    font-size: 11px; background: var(--green-pale); color: var(--green-deep);
    padding: 3px 9px; border-radius: 20px; font-weight: 500; white-space: nowrap;
  }

  .empty-hint {
    text-align: center; color: var(--gray-3); font-size: 13px;
    padding: 36px 0 20px; line-height: 2;
  }
  .empty-hint .icon { font-size: 30px; margin-bottom: 8px; display: block; }

  /* SUBTASK DRAWER */
  .subtask-drawer {
    display: none; position: absolute;
    left: 0; right: 0; bottom: 0;
    background: var(--white); border-radius: var(--radius);
    box-shadow: 0 -4px 28px rgba(26,122,74,0.14);
    z-index: 10; max-height: 360px;
    overflow-y: auto; scrollbar-width: none;
    animation: drawerUp 0.24s cubic-bezier(.4,0,.2,1);
  }
  .subtask-drawer::-webkit-scrollbar { display: none; }
  @keyframes drawerUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .subtask-drawer.open { display: block; }
  .drawer-header {
    position: sticky; top: 0; background: var(--white);
    padding: 16px 18px 10px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--gray-2);
  }
  .drawer-title { font-size: 13px; font-weight: 600; color: var(--gray-4); }
  .drawer-close {
    background: none; border: none; cursor: pointer;
    color: var(--gray-3); font-size: 18px; line-height: 1; padding: 0 2px;
    transition: color 0.2s;
  }
  .drawer-close:hover { color: var(--text-dark); }
  .drawer-goal-section { padding: 10px 16px 6px; }
  .drawer-goal-name {
    font-size: 12px; font-weight: 700; color: var(--green-deep);
    margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
  }
  .drawer-goal-name::before {
    content: ''; display: inline-block;
    width: 7px; height: 7px; background: var(--green-mid); border-radius: 50%;
  }
  .drawer-sub-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: var(--radius-sm);
    cursor: pointer; transition: all 0.15s; margin-bottom: 4px;
    border: 1.5px solid transparent;
  }
  .drawer-sub-item:hover { background: var(--green-pale); border-color: var(--green-light); }
  .drawer-sub-item.added { opacity: 0.38; cursor: default; pointer-events: none; }
  .drawer-sub-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green-light); flex-shrink: 0; }
  .drawer-sub-text { font-size: 14px; flex: 1; }
  .drawer-sub-check { font-size: 13px; color: var(--green-deep); }
  .drawer-empty { padding: 20px 18px; color: var(--gray-3); font-size: 13px; text-align: center; }

  /* MONTHLY */
  #monthly-screen .screen-content {
    flex: 1; padding: 0 22px 30px; overflow-y: auto; scrollbar-width: none;
  }
  #monthly-screen .screen-content::-webkit-scrollbar { display: none; }

  .donut-wrap { display: flex; flex-direction: column; align-items: center; padding: 12px 0 20px; }
  .donut-container { position: relative; width: 160px; height: 160px; }
  .donut-svg { transform: rotate(-90deg); }
  .donut-bg { fill: none; stroke: var(--gray-2); stroke-width: 18; }
  .donut-fill-expected {
    fill: none; stroke: var(--green-light); stroke-width: 18; stroke-linecap: round;
    stroke-dasharray: 389.56; transition: stroke-dashoffset 0.8s cubic-bezier(.4,0,.2,1);
  }
  .donut-fill {
    fill: none; stroke: var(--green-mid); stroke-width: 18; stroke-linecap: round;
    transition: stroke-dashoffset 0.8s cubic-bezier(.4,0,.2,1);
  }
  .donut-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .donut-pct { font-family: 'Georgia', 'Times New Roman', serif; font-size: 36px; color: var(--text-dark); line-height: 1; }
  .donut-label { font-size: 11px; color: var(--gray-3); margin-top: 2px; }
  .donut-legend { display: flex; gap: 18px; margin-top: 12px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--gray-4); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

  .goals-section-label {
    font-size: 12px; font-weight: 700; color: var(--gray-3);
    letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between;
  }
  .add-goal-btn {
    background: var(--green-deep); color: white; border: none;
    border-radius: 20px; padding: 5px 13px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif; transition: all 0.2s;
  }
  .add-goal-btn:hover { background: #155e38; }

  .goal-card {
    background: var(--gray-1); border-radius: var(--radius);
    padding: 18px 18px 16px; margin-bottom: 12px;
    border: 1.5px solid transparent; transition: all 0.22s;
  }
  .goal-card:hover { border-color: var(--green-light); box-shadow: 0 4px 18px rgba(46,204,113,0.10); }
  .goal-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .goal-card-title {
    font-size: 15px; font-weight: 600; color: var(--text-dark);
    flex: 1; cursor: pointer; transition: color 0.15s;
  }
  .goal-card-title:hover { color: var(--green-deep); }
  .goal-card-count {
    font-size: 12px; color: var(--gray-3);
    background: var(--white); padding: 3px 9px; border-radius: 12px;
  }
  .goal-action-btn {
    background: none; border: none; cursor: pointer;
    font-size: 15px; padding: 3px 5px; color: var(--gray-3);
    transition: color 0.15s; border-radius: 6px;
  }
  .goal-action-btn.edit:hover { color: var(--green-deep); }
  .goal-action-btn.del:hover { color: var(--red); }

  .goal-progress-bar {
    height: 8px; background: var(--gray-2); border-radius: 10px;
    overflow: hidden; margin-bottom: 6px; position: relative;
  }
  .gp-expected {
    position: absolute; top: 0; left: 0; height: 100%;
    background: var(--green-light); border-radius: 10px;
    transition: width 0.6s cubic-bezier(.4,0,.2,1);
  }
  .gp-actual {
    position: absolute; top: 0; left: 0; height: 100%;
    background: linear-gradient(90deg, var(--green-mid), var(--green-deep));
    border-radius: 10px; transition: width 0.6s cubic-bezier(.4,0,.2,1);
  }
  .goal-progress-nums { display: flex; justify-content: space-between; font-size: 11px; color: var(--gray-3); }
  .goal-pct-actual { color: var(--green-deep); font-weight: 600; }

  .divider { height: 1px; background: var(--gray-2); margin: 14px 0; }

  /* DETAIL */
  #detail-screen .screen-header { padding-bottom: 12px; }
  #detail-screen .screen-content {
    flex: 1; padding: 0 22px 30px; overflow-y: auto; scrollbar-width: none;
  }
  #detail-screen .screen-content::-webkit-scrollbar { display: none; }
  .back-btn {
    display: flex; align-items: center; gap: 6px;
    background: none; border: none; cursor: pointer;
    font-size: 14px; color: var(--gray-4);
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
    margin-bottom: 14px; padding: 0; transition: color 0.2s;
  }
  .back-btn:hover { color: var(--green-deep); }
  .detail-goal-title { font-family: 'Georgia', 'Times New Roman', serif; font-size: 24px; margin-bottom: 4px; }
  .detail-progress-summary { font-size: 13px; color: var(--gray-3); margin-bottom: 20px; }
  .detail-progress-summary span { color: var(--green-deep); font-weight: 600; }

  .subtask-list { display: flex; flex-direction: column; gap: 9px; }
  .subtask-item {
    background: var(--gray-1); border-radius: var(--radius-sm);
    padding: 13px 16px; display: flex; align-items: center; gap: 12px;
    cursor: pointer; border: 1.5px solid transparent; transition: all 0.18s;
  }
  .subtask-item:hover { border-color: var(--green-light); background: var(--green-pale); }
  .subtask-check {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid var(--green-mid); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .subtask-check.done { background: var(--green-mid); border-color: var(--green-mid); }
  .subtask-check.done::after { content: '✓'; color: white; font-size: 12px; font-weight: 700; }
  .subtask-text { font-size: 14px; flex: 1; }
  .subtask-text.done { text-decoration: line-through; color: var(--gray-3); }
  .subtask-del {
    background: none; border: none; cursor: pointer;
    color: var(--gray-3); font-size: 15px; padding: 0 2px;
    opacity: 0; transition: opacity 0.15s, color 0.15s; border-radius: 4px;
  }
  .subtask-item:hover .subtask-del { opacity: 1; }
  .subtask-del:hover { color: var(--red); }

  .add-subtask-form { margin-top: 14px; display: flex; gap: 8px; }
  .add-subtask-input {
    flex: 1; background: var(--gray-1); border: 1.5px solid var(--gray-2);
    border-radius: var(--radius-sm); padding: 12px 16px; font-size: 14px;
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif; color: var(--text-dark);
    outline: none; transition: border-color 0.2s;
  }
  .add-subtask-input:focus { border-color: var(--green-mid); background: var(--white); }
  .add-subtask-submit {
    width: 46px; height: 46px; background: var(--green-deep); border: none;
    border-radius: var(--radius-sm); color: white; font-size: 22px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
  }
  .add-subtask-submit:hover { background: #155e38; }

  /* MODALS */
  .modal-overlay {
    display: none; position: absolute; inset: 0;
    background: rgba(26,38,32,0.45); z-index: 100;
    align-items: flex-end; backdrop-filter: blur(2px);
  }
  .modal-overlay.show { display: flex; }
  .modal-sheet {
    background: var(--white); border-radius: 28px 28px 0 0;
    padding: 26px 24px 40px; width: 100%;
    animation: slideUp 0.26s cubic-bezier(.4,0,.2,1);
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
  .modal-input {
    width: 100%; background: var(--gray-1); border: 1.5px solid var(--gray-2);
    border-radius: var(--radius-sm); padding: 12px 16px; font-size: 14px;
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif; color: var(--text-dark);
    outline: none; margin-bottom: 10px; transition: border-color 0.2s;
  }
  .modal-input:focus { border-color: var(--green-mid); background: var(--white); }
  .modal-submit {
    width: 100%; background: var(--green-deep); color: white; border: none;
    border-radius: var(--radius-sm); padding: 14px; font-size: 15px; font-weight: 600;
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif; cursor: pointer; transition: all 0.2s;
  }
  .modal-submit:hover { background: #155e38; }
  .modal-cancel {
    width: 100%; background: none; border: none; color: var(--gray-3); font-size: 14px;
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif; cursor: pointer; padding: 10px; margin-top: 4px;
  }
  .confirm-btns { display: flex; gap: 10px; margin-top: 6px; }
  .confirm-del {
    flex: 1; background: var(--red); color: white; border: none;
    border-radius: var(--radius-sm); padding: 13px; font-size: 15px; font-weight: 600;
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif; cursor: pointer;
  }
  .confirm-cancel {
    flex: 1; background: var(--gray-2); color: var(--gray-4); border: none;
    border-radius: var(--radius-sm); padding: 13px; font-size: 15px; font-weight: 600;
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif; cursor: pointer;
  }
  .delete-desc { font-size: 13px; color: var(--gray-4); margin-bottom: 18px; }

  /* CARRYOVER */
  .carryover-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; border-radius: var(--radius-sm);
    background: var(--gray-1); margin-bottom: 8px;
    cursor: pointer; border: 1.5px solid transparent; transition: all 0.15s;
  }
  .carryover-item.selected { background: var(--green-pale); border-color: var(--green-light); }
  .carryover-check {
    width: 22px; height: 22px; border-radius: 6px;
    border: 2px solid var(--gray-2); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .carryover-item.selected .carryover-check {
    background: var(--green-mid); border-color: var(--green-mid); color: white;
    font-size: 13px; font-weight: 700;
  }
  .carryover-item.selected .carryover-check::after { content: '✓'; }
  .carryover-goal-name { font-size: 14px; font-weight: 600; flex: 1; }
  .carryover-goal-sub { font-size: 12px; color: var(--gray-3); margin-top: 1px; }

  /* CAL ICON BUTTON */
  .cal-icon-btn {
    position: absolute; top: 50px; right: 28px;
    width: 36px; height: 36px;
    background: var(--green-pale); border: none; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 17px; transition: all 0.2s;
  }
  .cal-icon-btn:hover { background: var(--green-light); transform: scale(1.08); }

  /* CALENDAR SCREEN */
  #calendar-screen .screen-content {
    flex: 1; padding: 0 20px 30px; overflow-y: auto; scrollbar-width: none;
  }
  #calendar-screen .screen-content::-webkit-scrollbar { display: none; }
  .cal-grid-header {
    display: grid; grid-template-columns: repeat(7,1fr);
    text-align: center; margin-bottom: 6px;
  }
  .cal-grid-header span { font-size: 11px; font-weight: 700; color: var(--gray-3); padding: 4px 0; }
  .cal-grid-header span:first-child { color: #e57373; }
  .cal-grid-header span:last-child { color: #5b9bd5; }
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
  .cal-day {
    aspect-ratio: 1; border-radius: 50%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-size: 14px; cursor: pointer;
    transition: all 0.15s; position: relative;
    border: 1.5px solid transparent;
  }
  .cal-day:hover { background: var(--green-pale); }
  .cal-day.empty { cursor: default; pointer-events: none; }
  .cal-day.today { background: var(--green-deep); color: white; font-weight: 700; }
  .cal-day.today:hover { background: #155e38; }
  .cal-day.has-record { border-color: var(--green-light); }
  .cal-day.has-record::after {
    content: ''; position: absolute; bottom: 5px;
    width: 5px; height: 5px; border-radius: 50%; background: var(--green-mid);
  }
  .cal-day.today.has-record::after { background: rgba(255,255,255,0.7); }
  .cal-day.sunday { color: #e57373; }
  .cal-day.saturday { color: #5b9bd5; }
  .cal-day.today.sunday, .cal-day.today.saturday { color: white; }
  .cal-day.past-done { background: var(--green-pale); }

  /* DAY RECORD SCREEN */
  #dayrecord-screen .screen-content {
    flex: 1; padding: 0 22px 30px; overflow-y: auto; scrollbar-width: none;
  }
  #dayrecord-screen .screen-content::-webkit-scrollbar { display: none; }
  .dayrecord-date {
    font-family: 'Georgia','Times New Roman',serif;
    font-size: 60px; line-height: 1; letter-spacing: -2px; margin-bottom: 4px;
  }
  .dayrecord-sub { font-size: 14px; color: var(--gray-3); font-weight: 300; margin-bottom: 20px; }
  .dayrecord-empty {
    text-align: center; color: var(--gray-3); font-size: 13px;
    padding: 50px 0; line-height: 2.2;
  }
  .dayrecord-empty .icon { font-size: 28px; display: block; margin-bottom: 8px; }
  .record-task-item {
    background: var(--gray-1); border-radius: var(--radius-sm);
    padding: 13px 16px; margin-bottom: 9px;
    display: flex; align-items: center; gap: 12px;
  }
  .record-check {
    width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .record-check.done { background: var(--green-mid); color: white; font-size: 12px; font-weight: 700; }
  .record-check.done::after { content: '✓'; }
  .record-check.undone { border: 2px solid var(--gray-2); }
  .record-task-text { font-size: 14px; flex: 1; }
  .record-task-text.done { text-decoration: line-through; color: var(--gray-3); }
  .record-task-tag {
    font-size: 11px; background: var(--green-pale); color: var(--green-deep);
    padding: 3px 9px; border-radius: 20px; font-weight: 500; white-space: nowrap;
  }
</style>
</head>
<body>

<!-- DAILY -->
<div id="daily-screen" class="screen active">
  <div class="screen-header">
    <button class="cal-icon-btn" onclick="showCalendar()" title="달력">📅</button>
    <button class="month-btn" onclick="showMonthly()">
      <span id="daily-month-label">3월</span>
      <span class="arrow">↑</span>
    </button>
  </div>
  <div class="screen-content">
    <div class="date-big" id="today-date">27</div>
    <div class="date-day" id="today-day">금요일 · 3월 2026</div>

    <div class="daily-tasks-box" id="daily-tasks-box">
      <div class="daily-box-header">
        <span class="box-label">오늘의 학습</span>
        <button class="add-task-btn" id="add-task-btn" onclick="toggleDrawer(event)" title="세부 목표 추가">+</button>
      </div>
      <div id="daily-task-list"></div>
      <div id="daily-empty" class="empty-hint">
        <span class="icon">📚</span>
        오른쪽 <strong style="color:var(--green-deep)">+</strong> 버튼으로<br>오늘의 세부 목표를 추가해보세요
      </div>

      <!-- Drawer -->
      <div class="subtask-drawer" id="subtask-drawer">
        <div class="drawer-header">
          <span class="drawer-title">세부 목표 선택</span>
          <button class="drawer-close" onclick="closeDrawer()">✕</button>
        </div>
        <div id="drawer-content"></div>
      </div>
    </div>
  </div>
</div>

<!-- CALENDAR -->
<div id="calendar-screen" class="screen">
  <div class="screen-header">
    <button class="back-btn" onclick="showDaily()">← 돌아가기</button>
    <div class="detail-goal-title" id="cal-title">3월</div>
  </div>
  <div class="screen-content">
    <div class="cal-grid-header">
      <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>
</div>

<!-- DAY RECORD -->
<div id="dayrecord-screen" class="screen">
  <div class="screen-header">
    <button class="back-btn" onclick="showCalendar()">← 달력</button>
    <div class="dayrecord-date" id="dayrecord-date"></div>
    <div class="dayrecord-sub" id="dayrecord-sub"></div>
  </div>
  <div class="screen-content">
    <div id="dayrecord-list"></div>
  </div>
</div>

<!-- MONTHLY -->
<div id="monthly-screen" class="screen">
  <div class="screen-header">
    <button class="month-btn" onclick="showDaily()">
      <span id="monthly-month-label">3월</span>
      <span class="arrow">↓</span>
    </button>
  </div>
  <div class="screen-content">
    <div class="donut-wrap">
      <div class="donut-container">
        <svg class="donut-svg" width="160" height="160" viewBox="0 0 160 160">
          <circle class="donut-bg" cx="80" cy="80" r="62"/>
          <circle class="donut-fill" cx="80" cy="80" r="62" id="donut-actual" stroke-dasharray="389.56" stroke-dashoffset="389.56"/>
        </svg>
        <div class="donut-center">
          <div class="donut-pct" id="donut-pct">0%</div>
          <div class="donut-label">전체 진행률</div>
        </div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="goals-section-label">
      개별 목표
      <button class="add-goal-btn" onclick="openAddGoalModal()">+ 목표 추가</button>
    </div>
    <div id="goal-cards-container"></div>
  </div>
</div>

<!-- DETAIL -->
<div id="detail-screen" class="screen">
  <div class="screen-header">
    <button class="back-btn" onclick="showMonthly()">← 돌아가기</button>
    <div class="detail-goal-title" id="detail-title"></div>
    <div class="detail-progress-summary" id="detail-summary"></div>
  </div>
  <div class="screen-content">
    <div class="subtask-list" id="subtask-list"></div>
    <div class="add-subtask-form">
      <input class="add-subtask-input" id="subtask-input" type="text" placeholder="세부 목표 추가 (예: 1강, 2단원)">
      <button class="add-subtask-submit" onclick="addSubtask()">+</button>
    </div>
  </div>
</div>

<!-- MODAL: Add/Edit Goal -->
<div class="modal-overlay" id="goal-modal" onclick="closeGoalModal(event)">
  <div class="modal-sheet">
    <div class="modal-title" id="goal-modal-title">새 목표 추가</div>
    <input class="modal-input" id="goal-modal-name" type="text" placeholder="목표 이름 (예: 올오카 완강하기)">
    <button class="modal-submit" onclick="submitGoalModal()">저장하기</button>
    <button class="modal-cancel" onclick="closeGoalModal()">취소</button>
  </div>
</div>

<!-- MODAL: Delete Confirm -->
<div class="modal-overlay" id="delete-modal" onclick="closeDeleteModal(event)">
  <div class="modal-sheet">
    <div class="modal-title" id="delete-modal-title">목표 삭제</div>
    <p class="delete-desc" id="delete-modal-desc"></p>
    <div class="confirm-btns">
      <button class="confirm-cancel" onclick="closeDeleteModal()">취소</button>
      <button class="confirm-del" onclick="confirmDelete()">삭제</button>
    </div>
  </div>
</div>

<!-- MODAL: 이전 달 목표 이어가기 -->
<div class="modal-overlay" id="carryover-modal">
  <div class="modal-sheet">
    <div class="modal-title" id="carryover-title">이전 달 목표 가져오기</div>
    <p class="delete-desc" id="carryover-desc"></p>
    <div id="carryover-goal-list" style="margin-bottom:14px;max-height:220px;overflow-y:auto;"></div>
    <button class="modal-submit" onclick="confirmCarryover()">선택한 목표 가져오기</button>
    <button class="modal-cancel" onclick="skipCarryover()">새로 시작하기</button>
  </div>
</div>

<script>
// ===== 실제 날짜 자동 적용 =====
const today = new Date();
const currentMonth = today.getMonth();
const currentYear = today.getFullYear();
const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
const daysPassed = today.getDate();
const MONTHS_KR = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const DAYS_KR = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];

// 월 키: "2026-4" 형식으로 월별 목표 분리 저장
const monthKey = currentYear + '-' + (currentMonth + 1);
const todayKey = currentYear + '-' + (currentMonth+1) + '-' + today.getDate();

// ===== STORAGE =====
// 목표는 월별로 저장: sp_goals_2026-4
const STORAGE_KEY_GOALS = 'sp_goals_' + monthKey;
const STORAGE_KEY_NEXT_GOAL_ID = 'sp_nextGoalId_' + monthKey;
const STORAGE_KEY_DAILY = 'sp_daily';
const STORAGE_KEY_DAILY_DATE = 'sp_dailyDate';
const STORAGE_KEY_DAILY_NEXT_ID = 'sp_dailyNextId';

function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY_GOALS, JSON.stringify(goals));
    localStorage.setItem(STORAGE_KEY_NEXT_GOAL_ID, nextGoalId);
    localStorage.setItem(STORAGE_KEY_DAILY, JSON.stringify(dailyTasks));
    localStorage.setItem(STORAGE_KEY_DAILY_DATE, todayKey);
    localStorage.setItem(STORAGE_KEY_DAILY_NEXT_ID, dailyTaskNextId);
    localStorage.setItem('sp_dailyAddedKeys', JSON.stringify([...dailyAddedKeys]));
  } catch(e) { console.warn('저장 실패', e); }
}

function loadData() {
  try {
    // 기존 키(sp_goals)로 저장된 데이터가 있으면 새 키로 마이그레이션
    const oldGoals = localStorage.getItem('sp_goals');
    if (oldGoals && !localStorage.getItem(STORAGE_KEY_GOALS)) {
      localStorage.setItem(STORAGE_KEY_GOALS, oldGoals);
      const oldNextId = localStorage.getItem('sp_nextGoalId');
      if (oldNextId) localStorage.setItem(STORAGE_KEY_NEXT_GOAL_ID, oldNextId);
    }

    const savedGoals = localStorage.getItem(STORAGE_KEY_GOALS);
    if (savedGoals) {
      goals = JSON.parse(savedGoals);
      nextGoalId = parseInt(localStorage.getItem(STORAGE_KEY_NEXT_GOAL_ID)) || nextGoalId;
    } else {
      // 이번 달 목표 없음 → 이전 달 목표 있으면 carryover 모달 표시
      checkCarryover();
    }
    // 오늘 날짜와 저장된 날짜가 같을 때만 당일 계획 복원
    const savedDate = localStorage.getItem(STORAGE_KEY_DAILY_DATE);
    if (savedDate === todayKey) {
      const savedDaily = localStorage.getItem(STORAGE_KEY_DAILY);
      if (savedDaily) dailyTasks = JSON.parse(savedDaily);
      dailyTaskNextId = parseInt(localStorage.getItem(STORAGE_KEY_DAILY_NEXT_ID)) || 1;
      const savedKeys = localStorage.getItem('sp_dailyAddedKeys');
      if (savedKeys) dailyAddedKeys = new Set(JSON.parse(savedKeys));
    }
  } catch(e) { console.warn('불러오기 실패', e); }
}

// ===== CARRYOVER =====
let carryoverSelected = new Set();
let carryoverGoals = [];

function getPrevMonthKey() {
  let m = currentMonth - 1, y = currentYear;
  if (m < 0) { m = 11; y--; }
  return y + '-' + (m + 1);
}

function checkCarryover() {
  const prevKey = 'sp_goals_' + getPrevMonthKey();
  const oldKey = 'sp_goals'; // 마이그레이션 전 키도 확인
  const prevData = localStorage.getItem(prevKey) || localStorage.getItem(oldKey);
  if (!prevData) {
    // 이전 달 목표도 없으면 모달 숨기기
    document.getElementById('carryover-modal').classList.remove('show');
    return;
  }
  try {
    carryoverGoals = JSON.parse(prevData);
    if (carryoverGoals.length === 0) {
      document.getElementById('carryover-modal').classList.remove('show');
      return;
    }
    const prevMonthLabel = MONTHS_KR[currentMonth === 0 ? 11 : currentMonth - 1];
    document.getElementById('carryover-title').textContent = prevMonthLabel + ' 목표 이어가기';
    document.getElementById('carryover-desc').textContent =
      prevMonthLabel + '에 설정한 목표를 이번 달에도 가져올 수 있어요. 가져올 목표를 선택하세요.';
    // 기본 전체 선택
    carryoverGoals.forEach(g => carryoverSelected.add(g.id));
    renderCarryoverList();
    document.getElementById('carryover-modal').classList.add('show');
  } catch(e) {
    document.getElementById('carryover-modal').classList.remove('show');
  }
}

function renderCarryoverList() {
  const list = document.getElementById('carryover-goal-list');
  list.innerHTML = '';
  carryoverGoals.forEach(g => {
    const item = document.createElement('div');
    const sel = carryoverSelected.has(g.id);
    item.className = 'carryover-item' + (sel ? ' selected' : '');
    item.innerHTML = `
      <div class="carryover-check"></div>
      <div style="flex:1">
        <div class="carryover-goal-name">${g.name}</div>
        <div class="carryover-goal-sub">세부 목표 ${g.subtasks.length}개</div>
      </div>
    `;
    item.onclick = () => {
      if (carryoverSelected.has(g.id)) carryoverSelected.delete(g.id);
      else carryoverSelected.add(g.id);
      renderCarryoverList();
    };
    list.appendChild(item);
  });
}

function confirmCarryover() {
  const selected = carryoverGoals.filter(g => carryoverSelected.has(g.id));
  // 체크 상태는 리셋, 목표 구조만 가져오기
  goals = selected.map(g => ({
    ...g,
    subtasks: g.subtasks.map(s => ({...s, done: false}))
  }));
  nextGoalId = goals.length > 0 ? Math.max(...goals.map(g => g.id)) + 1 : 1;
  saveData();
  document.getElementById('carryover-modal').classList.remove('show');
  renderGoalCards();
  updateDonut();
}

function skipCarryover() {
  goals = [];
  nextGoalId = 1;
  document.getElementById('carryover-modal').classList.remove('show');
  renderGoalCards();
  updateDonut();
}

let goals = [];
let nextGoalId = 1;
let dailyTasks = [];
let dailyAddedKeys = new Set();
let dailyTaskNextId = 1;
let drawerOpen = false;
let currentDetailGoalId = null;
let goalModalMode = 'add';
let goalModalEditId = null;
let deleteTargetId = null;

function init() {
  loadData();
  document.getElementById('today-date').textContent = today.getDate();
  document.getElementById('today-day').textContent =
    DAYS_KR[today.getDay()] + ' · ' + MONTHS_KR[currentMonth] + ' ' + currentYear;
  const mo = MONTHS_KR[currentMonth];
  document.getElementById('daily-month-label').textContent = mo;
  document.getElementById('monthly-month-label').textContent = mo;
  document.getElementById('cal-title').textContent = mo;
  renderDailyTasks();
  renderGoalCards();
  updateDonut();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  closeDrawer();
}
function showMonthly() { renderGoalCards(); updateDonut(); showScreen('monthly-screen'); }
function showDaily() { renderDailyTasks(); showScreen('daily-screen'); }
function showDetail(goalId) {
  currentDetailGoalId = goalId;
  renderSubtaskList();
  showScreen('detail-screen');
}

// DRAWER
function toggleDrawer(e) {
  e.stopPropagation();
  if (drawerOpen) { closeDrawer(); return; }
  drawerOpen = true;
  renderDrawer();
  document.getElementById('subtask-drawer').classList.add('open');
  setTimeout(() => document.addEventListener('click', outsideDrawerClick), 0);
}
function closeDrawer() {
  drawerOpen = false;
  document.getElementById('subtask-drawer').classList.remove('open');
  document.removeEventListener('click', outsideDrawerClick);
}
function outsideDrawerClick(e) {
  const drawer = document.getElementById('subtask-drawer');
  const btn = document.getElementById('add-task-btn');
  if (!drawer.contains(e.target) && e.target !== btn) closeDrawer();
}
function renderDrawer() {
  const content = document.getElementById('drawer-content');
  content.innerHTML = '';
  let anyItem = false;
  goals.forEach(goal => {
    const avail = goal.subtasks.filter(s => !s.done);
    if (avail.length === 0) return;
    anyItem = true;
    const sec = document.createElement('div');
    sec.className = 'drawer-goal-section';
    const nameEl = document.createElement('div');
    nameEl.className = 'drawer-goal-name';
    nameEl.textContent = goal.name;
    sec.appendChild(nameEl);
    avail.forEach(sub => {
      const key = goal.id + '_' + sub.id;
      const item = document.createElement('div');
      const isAdded = dailyAddedKeys.has(key);
      item.className = 'drawer-sub-item' + (isAdded ? ' added' : '');
      item.innerHTML = `<div class="drawer-sub-dot"></div><span class="drawer-sub-text">${sub.text}</span>${isAdded ? '<span class="drawer-sub-check">✓</span>' : ''}`;
      if (!isAdded) {
        item.onclick = (e) => { e.stopPropagation(); addDailyTask(goal, sub, key, item); };
      }
      sec.appendChild(item);
    });
    content.appendChild(sec);
  });
  if (!anyItem) {
    content.innerHTML = '<div class="drawer-empty">추가할 세부 목표가 없어요</div>';
  }
}

// DAILY
function renderDailyTasks() {
  const list = document.getElementById('daily-task-list');
  const empty = document.getElementById('daily-empty');
  list.innerHTML = '';
  empty.style.display = dailyTasks.length === 0 ? 'block' : 'none';
  dailyTasks.forEach(task => {
    const div = document.createElement('div');
    div.className = 'daily-task-item';
    div.innerHTML = `
      <div class="daily-task-check ${task.done ? 'done' : ''}" onclick="toggleDailyTask(${task.id})"></div>
      <span class="daily-task-text ${task.done ? 'done' : ''}">${task.text}</span>
      <span class="daily-task-tag">${task.tag}</span>
    `;
    list.appendChild(div);
  });
}
function addDailyTask(goal, sub, key, itemEl) {
  dailyAddedKeys.add(key);
  itemEl.classList.add('added');
  itemEl.innerHTML = `<div class="drawer-sub-dot"></div><span class="drawer-sub-text">${sub.text}</span><span class="drawer-sub-check">✓</span>`;
  dailyTasks.push({
    id: dailyTaskNextId++,
    text: goal.name + ' · ' + sub.text,
    tag: sub.text,
    goalId: goal.id, subtaskId: sub.id, done: false
  });
  renderDailyTasks(); saveData(); saveHistory();
}
function toggleDailyTask(taskId) {
  const task = dailyTasks.find(t => t.id === taskId);
  if (!task) return;
  task.done = !task.done;
  const goal = goals.find(g => g.id === task.goalId);
  if (goal) { const sub = goal.subtasks.find(s => s.id === task.subtaskId); if (sub) sub.done = task.done; }
  renderDailyTasks(); saveData(); saveHistory();
}

// DONUT
function updateDonut() {
  let total = 0, done = 0;
  goals.forEach(g => { total += g.subtasks.length; done += g.subtasks.filter(s => s.done).length; });
  const actualPct = total > 0 ? Math.round((done / total) * 100) : 0;
  const expectedPct = Math.min(Math.round((daysPassed / daysInMonth) * 100), 100);
  const C = 2 * Math.PI * 62;
  document.getElementById('donut-actual').style.strokeDashoffset = C * (1 - actualPct / 100);
  document.getElementById('donut-pct').textContent = actualPct + '%';
}

// GOAL CARDS
function renderGoalCards() {
  const container = document.getElementById('goal-cards-container');
  container.innerHTML = '';
  if (goals.length === 0) {
    container.innerHTML = '<div style="text-align:center;color:var(--gray-3);font-size:13px;padding:30px 0;">아직 목표가 없어요<br>위 버튼으로 추가해보세요</div>';
    return;
  }
  goals.forEach(goal => {
    const total = goal.subtasks.length;
    const done = goal.subtasks.filter(s => s.done).length;
    const actualPct = total > 0 ? Math.round((done / total) * 100) : 0;
    const expectedPct = Math.min(Math.round((daysPassed / daysInMonth) * 100), 100);
    const card = document.createElement('div');
    card.className = 'goal-card';
    card.innerHTML = `
      <div class="goal-card-header">
        <div class="goal-card-title" onclick="showDetail(${goal.id})">${goal.name}</div>
        <div class="goal-card-count">${done}/${total}</div>
        <button class="goal-action-btn edit" onclick="openEditGoalModal(${goal.id})" title="수정">✏️</button>
        <button class="goal-action-btn del" onclick="openDeleteModal(${goal.id})" title="삭제">🗑️</button>
      </div>
      <div class="goal-progress-bar">
        <div class="gp-actual" style="width:${actualPct}%"></div>
      </div>
      <div class="goal-progress-nums">
        <span class="goal-pct-actual">진행률 ${actualPct}%</span>
        <span style="color:var(--gray-3);font-size:11px;">${done}/${total}</span>
      </div>
    `;
    container.appendChild(card);
  });
}

// GOAL MODAL
function openAddGoalModal() {
  goalModalMode = 'add'; goalModalEditId = null;
  document.getElementById('goal-modal-title').textContent = '새 목표 추가';
  document.getElementById('goal-modal-name').value = '';
  document.getElementById('goal-modal').classList.add('show');
  setTimeout(() => document.getElementById('goal-modal-name').focus(), 100);
}
function openEditGoalModal(id) {
  goalModalMode = 'edit'; goalModalEditId = id;
  const goal = goals.find(g => g.id === id);
  document.getElementById('goal-modal-title').textContent = '목표 수정';
  document.getElementById('goal-modal-name').value = goal.name;
  document.getElementById('goal-modal').classList.add('show');
  setTimeout(() => document.getElementById('goal-modal-name').focus(), 100);
}
function closeGoalModal(e) {
  if (e && e.target !== document.getElementById('goal-modal') && !e.target.classList.contains('modal-cancel')) return;
  document.getElementById('goal-modal').classList.remove('show');
}
function submitGoalModal() {
  const name = document.getElementById('goal-modal-name').value.trim();
  if (!name) { document.getElementById('goal-modal-name').focus(); return; }
  if (goalModalMode === 'add') {
    goals.push({ id: nextGoalId++, name, subtasks: [], nextId: 1 });
  } else {
    const goal = goals.find(g => g.id === goalModalEditId);
    if (goal) {
      goal.name = name;
      if (currentDetailGoalId === goalModalEditId) document.getElementById('detail-title').textContent = name;
    }
  }
  document.getElementById('goal-modal').classList.remove('show');
  renderGoalCards(); updateDonut(); saveData();
}

// DELETE MODAL
function openDeleteModal(id) {
  deleteTargetId = id;
  const goal = goals.find(g => g.id === id);
  document.getElementById('delete-modal-title').textContent = `"${goal.name}" 삭제`;
  document.getElementById('delete-modal-desc').textContent = '삭제하면 세부 목표도 모두 사라져요.';
  document.getElementById('delete-modal').classList.add('show');
}
function closeDeleteModal(e) {
  if (e && e.target !== document.getElementById('delete-modal') && !e.target.classList.contains('confirm-cancel')) return;
  document.getElementById('delete-modal').classList.remove('show');
}
function confirmDelete() {
  goals = goals.filter(g => g.id !== deleteTargetId);
  dailyTasks = dailyTasks.filter(t => t.goalId !== deleteTargetId);
  [...dailyAddedKeys].forEach(k => { if (k.startsWith(deleteTargetId + '_')) dailyAddedKeys.delete(k); });
  document.getElementById('delete-modal').classList.remove('show');
  renderGoalCards(); updateDonut(); renderDailyTasks(); saveData();
}

// SUBTASK DETAIL
function renderSubtaskList() {
  const goal = goals.find(g => g.id === currentDetailGoalId);
  document.getElementById('detail-title').textContent = goal.name;
  const done = goal.subtasks.filter(s => s.done).length;
  const total = goal.subtasks.length;
  document.getElementById('detail-summary').innerHTML =
    `<span>${done}</span> / ${total} 완료 &nbsp;·&nbsp; 진행률 <span>${total > 0 ? Math.round(done/total*100) : 0}%</span>`;
  const list = document.getElementById('subtask-list');
  list.innerHTML = '';
  goal.subtasks.forEach(sub => {
    const div = document.createElement('div');
    div.className = 'subtask-item';
    div.innerHTML = `
      <div class="subtask-check ${sub.done ? 'done' : ''}"></div>
      <span class="subtask-text ${sub.done ? 'done' : ''}">${sub.text}</span>
      <button class="subtask-del" onclick="deleteSubtask(event,${sub.id})">✕</button>
    `;
    div.onclick = (e) => { if (!e.target.classList.contains('subtask-del')) toggleSubtask(sub.id); };
    list.appendChild(div);
  });
  document.getElementById('subtask-input').value = '';
}
function toggleSubtask(subId) {
  const goal = goals.find(g => g.id === currentDetailGoalId);
  const sub = goal.subtasks.find(s => s.id === subId);
  sub.done = !sub.done;
  dailyTasks.forEach(t => { if (t.goalId === goal.id && t.subtaskId === subId) t.done = sub.done; });
  renderSubtaskList(); updateDonut(); saveData();
}
function deleteSubtask(e, subId) {
  e.stopPropagation();
  const goal = goals.find(g => g.id === currentDetailGoalId);
  goal.subtasks = goal.subtasks.filter(s => s.id !== subId);
  const key = goal.id + '_' + subId;
  dailyAddedKeys.delete(key);
  dailyTasks = dailyTasks.filter(t => !(t.goalId === goal.id && t.subtaskId === subId));
  renderSubtaskList(); renderDailyTasks(); updateDonut(); saveData();
}
function addSubtask() {
  const input = document.getElementById('subtask-input');
  const text = input.value.trim();
  if (!text) return;
  const goal = goals.find(g => g.id === currentDetailGoalId);
  goal.subtasks.push({id: goal.nextId++, text, done: false});
  renderSubtaskList(); updateDonut(); saveData();
  input.value = ''; input.focus();
}
document.getElementById('subtask-input').addEventListener('keydown', e => { if (e.key === 'Enter') addSubtask(); });
document.getElementById('goal-modal-name').addEventListener('keydown', e => { if (e.key === 'Enter') submitGoalModal(); });

// CALENDAR & DAY HISTORY
const STORAGE_KEY_HISTORY = 'sp_history'; // { "2026-3-27": [{text,tag,done}, ...] }

function loadHistory() {
  try {
    const h = localStorage.getItem(STORAGE_KEY_HISTORY);
    return h ? JSON.parse(h) : {};
  } catch(e) { return {}; }
}
function saveHistory() {
  try {
    const history = loadHistory();
    if (dailyTasks.length > 0) {
      history[todayKey] = dailyTasks.map(t => ({text: t.text, tag: t.tag, done: t.done}));
      localStorage.setItem(STORAGE_KEY_HISTORY, JSON.stringify(history));
    }
  } catch(e) {}
}

function showCalendar() {
  const mo = MONTHS_KR[currentMonth];
  document.getElementById('cal-title').textContent = mo;
  renderCalGrid();
  showScreen('calendar-screen');
}

function renderCalGrid() {
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  const history = loadHistory();
  const firstDay = new Date(currentYear, currentMonth, 1).getDay(); // 0=Sun
  // empty cells
  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day empty';
    grid.appendChild(el);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const el = document.createElement('div');
    const dow = (firstDay + d - 1) % 7;
    const key = currentYear + '-' + (currentMonth+1) + '-' + d;
    const isToday = d === today.getDate();
    const hasRecord = !!history[key] || (isToday && dailyTasks.length > 0);
    let cls = 'cal-day';
    if (isToday) cls += ' today';
    if (dow === 0) cls += ' sunday';
    if (dow === 6) cls += ' saturday';
    if (hasRecord) cls += ' has-record';
    el.className = cls;
    el.textContent = d;
    el.onclick = () => showDayRecord(d, key, isToday);
    grid.appendChild(el);
  }
}

function showDayRecord(day, key, isToday) {
  const DAYS_KR2 = ['일','월','화','수','목','금','토'];
  const dow = new Date(currentYear, currentMonth, day).getDay();
  document.getElementById('dayrecord-date').textContent = day;
  document.getElementById('dayrecord-sub').textContent =
    DAYS_KR2[dow] + '요일 · ' + MONTHS_KR[currentMonth] + ' ' + currentYear;

  const list = document.getElementById('dayrecord-list');
  list.innerHTML = '';

  let tasks = [];
  if (isToday) {
    tasks = dailyTasks.map(t => ({text: t.text, tag: t.tag, done: t.done}));
  } else {
    const history = loadHistory();
    tasks = history[key] || [];
  }

  if (tasks.length === 0) {
    list.innerHTML = '<div class="dayrecord-empty"><span class="icon">📭</span>이 날의 학습 기록이 없어요</div>';
  } else {
    tasks.forEach(t => {
      const div = document.createElement('div');
      div.className = 'record-task-item';
      div.innerHTML = `
        <div class="record-check ${t.done ? 'done' : 'undone'}"></div>
        <span class="record-task-text ${t.done ? 'done' : ''}">${t.text}</span>
        <span class="record-task-tag">${t.tag}</span>
      `;
      list.appendChild(div);
    });
  }
  showScreen('dayrecord-screen');
}

init();
</script>
