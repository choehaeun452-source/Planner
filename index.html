<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>학습 플래너</title>
<style>
  :root {
    --green-deep: #1a7a4a;
    --green-mid: #2ecc71;
    --green-light: #a8f0c6;
    --green-pale: #e8f8f0;
    --white: #ffffff;
    --gray-1: #f7f9f8;
    --gray-2: #e8ece9;
    --gray-3: #b0bab4;
    --gray-4: #6b7c74;
    --text-dark: #1a2620;
    --red: #e74c3c;
    --shadow-card: 0 2px 12px rgba(0,0,0,0.07);
    --radius: 20px;
    --radius-sm: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  /* 화면 전체 높이 고정 (내부 스크롤을 위함) */
  body, html {
    height: 100%;
    overflow: hidden;
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: var(--gray-1);
    color: var(--text-dark);
  }

  .screen {
    display: none;
    width: 100%;
    max-width: 500px;
    height: 100vh; /* 화면 높이 고정 */
    margin: 0 auto;
    background: var(--white);
    flex-direction: column;
  }
  .screen.active { display: flex; }

  /* HEADER */
  .screen-header { padding: 48px 28px 16px; background: var(--white); flex-shrink: 0; }
  .month-btn {
    font-family: 'Georgia', serif; font-size: 28px;
    color: var(--text-dark); background: none; border: none;
    cursor: pointer; display: flex; align-items: center; gap: 8px;
  }
  .month-btn .arrow {
    width: 22px; height: 22px; background: var(--green-pale); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: var(--green-deep);
  }

  /* MONTHLY SCREEN STRUCTURE (상단 고정/하단 스크롤) */
  #monthly-screen { display: none; height: 100vh; flex-direction: column; }
  #monthly-screen.active { display: flex; }
  
  .fixed-top-area { flex-shrink: 0; background: var(--white); padding-bottom: 10px; }
  
  /* 개별 목표 리스트 스크롤 영역 */
  .scrollable-goals-container {
    flex: 1;
    overflow-y: auto;
    padding: 0 22px 40px;
    -webkit-overflow-scrolling: touch; /* iOS 부드러운 스크롤 */
  }
  .scrollable-goals-container::-webkit-scrollbar { display: none; }

  /* UI COMPONENTS */
  .donut-wrap { display: flex; flex-direction: column; align-items: center; padding: 12px 0 20px; }
  .donut-container { position: relative; width: 160px; height: 160px; }
  .donut-svg { transform: rotate(-90deg); }
  .donut-bg { fill: none; stroke: var(--gray-2); stroke-width: 18; }
  .donut-fill {
    fill: none; stroke: var(--green-mid); stroke-width: 18; stroke-linecap: round;
    stroke-dasharray: 389.56; transition: stroke-dashoffset 0.8s ease;
  }
  .donut-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .donut-pct { font-family: 'Georgia', serif; font-size: 36px; color: var(--text-dark); }
  .donut-label { font-size: 11px; color: var(--gray-3); }

  .goals-section-label {
    font-size: 12px; font-weight: 700; color: var(--gray-3);
    margin: 10px 22px 12px; display: flex; align-items: center; justify-content: space-between;
  }
  .add-goal-btn {
    background: var(--green-deep); color: white; border: none;
    border-radius: 20px; padding: 5px 13px; font-size: 12px; cursor: pointer;
  }

  .goal-card {
    background: var(--gray-1); border-radius: var(--radius);
    padding: 18px; margin-bottom: 12px; border: 1.5px solid transparent;
  }
  .goal-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .goal-card-title { font-size: 15px; font-weight: 600; flex: 1; cursor: pointer; }
  .goal-progress-bar { height: 8px; background: var(--gray-2); border-radius: 10px; overflow: hidden; margin-bottom: 6px; }
  .gp-actual { height: 100%; background: var(--green-mid); border-radius: 10px; transition: width 0.6s ease; }
  .goal-progress-nums { display: flex; justify-content: space-between; font-size: 11px; color: var(--gray-3); }
  
  /* DAILY */
  #daily-screen .screen-content { flex: 1; padding: 0 22px 30px; overflow-y: auto; }
  .date-big { font-family: 'Georgia', serif; font-size: 72px; line-height: 1; margin-bottom: 4px; }
  .date-day { font-size: 14px; color: var(--gray-3); margin-bottom: 20px; }
  .daily-tasks-box { background: var(--gray-1); border-radius: var(--radius); padding: 18px; flex: 1; display: flex; flex-direction: column; }
  #daily-task-list { flex: 1; overflow-y: auto; }
  
  .daily-task-item { background: var(--white); border-radius: var(--radius-sm); margin-bottom: 9px; padding: 12px 14px; display: flex; align-items: center; gap: 11px; box-shadow: var(--shadow-card); }
  .daily-task-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--green-mid); cursor: pointer; }
  .daily-task-check.done { background: var(--green-mid); }
  .daily-task-check.done::after { content: '✓'; color: white; display: flex; justify-content: center; font-size: 12px; }
  .daily-task-text.done { text-decoration: line-through; color: var(--gray-3); }

  /* DETAIL SCREEN */
  #detail-screen .screen-content { flex: 1; padding: 0 22px 30px; overflow-y: auto; }
  .back-btn { background: none; border: none; color: var(--gray-4); cursor: pointer; margin-bottom: 15px; }
  .subtask-item { background: var(--gray-1); border-radius: var(--radius-sm); padding: 13px 16px; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }

  /* MODALS */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: flex-end; }
  .modal-overlay.show { display: flex; }
  .modal-sheet { background: var(--white); border-radius: 28px 28px 0 0; padding: 26px 24px 40px; width: 100%; }
  .modal-input { width: 100%; background: var(--gray-1); border: 1.5px solid var(--gray-2); border-radius: var(--radius-sm); padding: 12px; margin-bottom: 15px; }
  .modal-submit { width: 100%; background: var(--green-deep); color: white; border: none; border-radius: var(--radius-sm); padding: 14px; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>

<div id="monthly-screen" class="screen active">
  <div class="fixed-top-area">
    <div class="screen-header">
      <button class="month-btn" onclick="showDaily()">
        <span id="monthly-month-label">4월</span>
        <span class="arrow">↓ 오늘</span>
      </button>
    </div>
    <div class="donut-wrap">
      <div class="donut-container">
        <svg class="donut-svg" width="160" height="160" viewBox="0 0 160 160">
          <circle class="donut-bg" cx="80" cy="80" r="62"/>
          <circle class="donut-fill" cx="80" cy="80" r="62" id="donut-actual"/>
        </svg>
        <div class="donut-center">
          <div class="donut-pct" id="donut-pct">0%</div>
          <div class="donut-label">전체 진행률</div>
        </div>
      </div>
    </div>
    <div class="goals-section-label">
      개별 목표
      <button class="add-goal-btn" onclick="openAddGoalModal()">+ 목표 추가</button>
    </div>
  </div>
  
  <div id="goal-cards-container" class="scrollable-goals-container"></div>
</div>

<div id="detail-screen" class="screen">
  <div class="screen-header">
    <button class="back-btn" onclick="showMonthly()">← 돌아가기</button>
    <div id="detail-title" style="font-size:24px; font-weight:bold; margin-bottom:10px;"></div>
    <div id="detail-summary" style="font-size:13px; color:var(--gray-3);"></div>
  </div>
  <div class="screen-content">
    <div id="subtask-list"></div>
    <div style="margin-top:20px; display:flex; gap:10px;">
      <input id="subtask-input" class="modal-input" style="margin-bottom:0;" placeholder="세부 항목 입력">
      <button onclick="addSubtask()" class="add-goal-btn" style="padding:0 20px;">추가</button>
    </div>
  </div>
</div>

<div id="daily-screen" class="screen">
  <div class="screen-header">
    <button class="month-btn" onclick="showMonthly()">
      <span id="daily-month-label">4월</span>
      <span class="arrow">↑ 전체</span>
    </button>
  </div>
  <div class="screen-content">
    <div class="date-big" id="today-date">23</div>
    <div class="date-day" id="today-day">목요일</div>
    <div class="daily-tasks-box">
      <div id="daily-task-list"></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="goal-modal">
  <div class="modal-sheet">
    <h3 style="margin-bottom:15px;">새 목표 추가</h3>
    <input class="modal-input" id="goal-modal-name" placeholder="목표 이름 (예: 언매 강의)">
    <button class="modal-submit" onclick="submitGoalModal()">저장하기</button>
    <button class="back-btn" style="width:100%; margin-top:10px;" onclick="closeGoalModal()">취소</button>
  </div>
</div>

<script>
// --- 데이터 및 초기화 ---
let goals = JSON.parse(localStorage.getItem('sp_goals')) || [];
let nextGoalId = parseInt(localStorage.getItem('sp_nextGoalId')) || 1;
let currentDetailGoalId = null;

const today = new Date();
const currentMonth = today.getMonth() + 1;

function init() {
  document.getElementById('monthly-month-label').textContent = currentMonth + '월';
  document.getElementById('daily-month-label').textContent = currentMonth + '월';
  document.getElementById('today-date').textContent = today.getDate();
  renderGoalCards();
  updateDonut();
}

function saveData() {
  localStorage.setItem('sp_goals', JSON.stringify(goals));
  localStorage.setItem('sp_nextGoalId', nextGoalId);
}

// --- 화면 전환 ---
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showMonthly() { renderGoalCards(); updateDonut(); showScreen('monthly-screen'); }
function showDaily() { showScreen('daily-screen'); renderDailyTasks(); }
function showDetail(goalId) {
  currentDetailGoalId = goalId;
  renderSubtaskList();
  showScreen('detail-screen');
}

// --- 목표 관리 (버그 수정됨) ---
function renderGoalCards() {
  const container = document.getElementById('goal-cards-container');
  container.innerHTML = '';
  
  if (goals.length === 0) {
    container.innerHTML = `<div style="text-align:center; color:var(--gray-3); margin-top:40px;">등록된 목표가 없습니다.</div>`;
    return;
  }

  goals.forEach(goal => {
    const total = goal.subtasks ? goal.subtasks.length : 0;
    const done = goal.subtasks ? goal.subtasks.filter(s => s.done).length : 0;
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;

    const card = document.createElement('div');
    card.className = 'goal-card';
    card.innerHTML = `
      <div class="goal-card-header">
        <div class="goal-card-title">${goal.name}</div>
        <div style="font-size:12px; color:var(--gray-3);">${done}/${total}</div>
        <button onclick="event.stopPropagation(); deleteGoal(${goal.id})" style="background:none; border:none; cursor:pointer;">🗑️</button>
      </div>
      <div class="goal-progress-bar">
        <div class="gp-actual" style="width: ${pct}%"></div>
      </div>
      <div class="goal-progress-nums">
        <span>진행률 ${pct}%</span>
      </div>
    `;
    // 클릭 이벤트 분리 (데이터 혼선 방지)
    card.addEventListener('click', () => showDetail(goal.id));
    container.appendChild(card);
  });
}

function deleteGoal(id) {
  if(confirm('이 목표를 삭제할까요?')) {
    goals = goals.filter(g => g.id !== id);
    saveData();
    renderGoalCards();
    updateDonut();
  }
}

// --- 세부 목표 관리 ---
function renderSubtaskList() {
  const goal = goals.find(g => g.id === currentDetailGoalId);
  if (!goal) return;

  document.getElementById('detail-title').textContent = goal.name;
  const total = goal.subtasks.length;
  const done = goal.subtasks.filter(s => s.done).length;
  document.getElementById('detail-summary').textContent = `${total}개 중 ${done}개 완료`;

  const list = document.getElementById('subtask-list');
  list.innerHTML = '';
  goal.subtasks.forEach((sub, index) => {
    const div = document.createElement('div');
    div.className = 'subtask-item';
    div.innerHTML = `
      <div class="daily-task-check ${sub.done ? 'done' : ''}"></div>
      <span style="${sub.done ? 'text-decoration:line-through; color:var(--gray-3);' : ''}">${sub.text}</span>
    `;
    div.onclick = () => {
      sub.done = !sub.done;
      saveData();
      renderSubtaskList();
    };
    list.appendChild(div);
  });
}

function addSubtask() {
  const input = document.getElementById('subtask-input');
  if (!input.value.trim()) return;
  const goal = goals.find(g => g.id === currentDetailGoalId);
  if (!goal.subtasks) goal.subtasks = [];
  goal.subtasks.push({ text: input.value.trim(), done: false });
  input.value = '';
  saveData();
  renderSubtaskList();
}

// --- 모달 제어 ---
function openAddGoalModal() { document.getElementById('goal-modal').classList.add('show'); }
function closeGoalModal() { document.getElementById('goal-modal').classList.remove('show'); }
function submitGoalModal() {
  const name = document.getElementById('goal-modal-name').value.trim();
  if (!name) return;
  goals.push({ id: nextGoalId++, name: name, subtasks: [] });
  saveData();
  closeGoalModal();
  renderGoalCards();
  document.getElementById('goal-modal-name').value = '';
}

// --- 도넛 차트 업데이트 ---
function updateDonut() {
  let total = 0, done = 0;
  goals.forEach(g => {
    total += g.subtasks.length;
    done += g.subtasks.filter(s => s.done).length;
  });
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  const offset = 389.56 * (1 - pct / 100);
  document.getElementById('donut-actual').style.strokeDashoffset = offset;
  document.getElementById('donut-pct').textContent = pct + '%';
}

init();
</script>
</body>
</html>
